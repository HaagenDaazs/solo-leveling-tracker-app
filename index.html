  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#07070f}
    body{padding-top:env(safe-area-inset-top)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#0a0a18}
    ::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
    input,button,select,textarea{-webkit-tap-highlight-color:transparent}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.45}}
    @keyframes bossShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    @keyframes bossFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes bossHurt{0%,100%{filter:brightness(1)}50%{filter:brightness(3) saturate(0)}}
    @keyframes glowPulse{0%,100%{opacity:0.7}50%{opacity:1}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes achievePop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    .qcard{animation:fadeIn 0.28s ease forwards;opacity:0}
    .qcard:active{transform:scale(0.98)!important}
    .timer-urgent{animation:timerPulse 1s infinite}
    .boss-float{animation:bossFloat 3s ease-in-out infinite}
    .boss-hurt{animation:bossHurt 0.4s ease}
    .boss-banner{animation:slideDown 0.4s ease forwards}
    .achieve-pop{animation:achievePop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
    .glow-pulse{animation:glowPulse 2s ease-in-out infinite}
  </style>
</head>

function getRank(xp){for(let i=RANK_THRESHOLDS.length-1;i>=0;i--){if(xp>=RANK_THRESHOLDS[i])return RANKS[i];}return"E";}
function getXPInfo(xp){const rank=getRank(xp),idx=RANKS.indexOf(rank);if(idx>=RANKS.length-1)return{pct:100,nextRank:"MAX"};const cur=RANK_THRESHOLDS[idx],nxt=RANK_THRESHOLDS[idx+1];return{pct:Math.round(((xp-cur)/(nxt-cur))*100),nextRank:RANKS[idx+1]};}
function getStatRankIdx(xp){for(let i=STAT_RANK_XP.length-1;i>=0;i--){if((xp||0)>=STAT_RANK_XP[i])return i;}return 0;}
function getStatRank(xp){return RANKS[getStatRankIdx(xp)];}
function getStatPct(xp){const idx=getStatRankIdx(xp);if(idx>=RANKS.length-1)return 100;return Math.round(((xp||0)-STAT_RANK_XP[idx])/(STAT_RANK_XP[idx+1]-STAT_RANK_XP[idx])*100);}
function getStatNextRank(xp){const idx=getStatRankIdx(xp);return idx>=RANKS.length-1?"MAX":RANKS[idx+1];}
function hexToRgb(hex){try{return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}catch{return"100,100,200";}}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getMidnightMs(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate()+1,0,0,0,0).getTime()-n.getTime();}
function getBuffMult(achievements,stat){
  let total=0;
  achievements.forEach(id=>{
    const a=ACHIEVEMENT_CATALOG.find(a=>a.id===id);
    if(a&&a.buff&&a.buff.stat===stat)total+=a.buff.pct;
    BOSSES.forEach(b=>{if(b.achDrop&&b.achDrop.id===id&&b.achDrop.buff&&b.achDrop.buff.stat===stat)total+=b.achDrop.buff.pct;});
  });
  return 1+(total/100);
}
function pickCards(n=3){
  const by={};CARDS.forEach(c=>{if(!by[c.tier])by[c.tier]=[];by[c.tier].push(c);});
  Object.keys(by).forEach(t=>by[t].sort(()=>Math.random()-0.5));
  const tiers=["mythic","legendary","epic","rare","uncommon","common"];
  const result=[];
  for(const t of tiers){if(result.length>=n)break;if(by[t]?.length)result.push(by[t].pop());}
  while(result.length<n){const all=CARDS.filter(c=>!result.find(r=>r.id===c.id)).sort(()=>Math.random()-0.5);if(!all.length)break;result.push(all[0]);}
  return result.slice(0,n);
}
function getRecommendedStart(stat,target,unit){
  const t=parseFloat(target)||0;if(!t)return null;
  const u=(unit||"").toLowerCase();
  if(stat!=="strength")return null;
  if(u.includes("kg")||u.includes("lb")){const rec=Math.max(1,Math.round(t*0.6));return{value:rec,reason:"Starting at ~60% of your goal helps ensure a safe working baseline."};}
  const rec=Math.max(1,Math.round(t*0.3));
  return{value:rec,reason:"Starting at ~30% helps ensure safe bodyweight progression."};
}
function getDailyValue(sg,dayIndex,totalDays,penaltyFactor=1.0){
  const mode=STATS[sg.stat]?.mode||"incremental";
  if(mode==="flat")return sg.target;
  const start=sg.startValue??sg.currentLevel??0;
  const target=sg.target;
  const range=target-start;
  if(range<=0)return target;
  const t=dayIndex/Math.max(totalDays-1,1);
  const eased=Math.pow(t,0.6);
  let val=start+range*eased;
  val=Math.round(val*10)/10;
  if(penaltyFactor>1)val=Math.min(target,Math.round(val*penaltyFactor*10)/10);
  return Math.max(start,Math.min(target,val));
}
function calcTaskXP(task,achievements=[]){
  const base=50+task.value*1.5+(task.dayIndex||0)*2;
  const buffMult=getBuffMult(achievements,task.stat);
  return Math.round(base*(task.xpMult||1)*buffMult);
}

    return{id:`${quest.id}_${sg.stat}_${dayIndex}_${Math.random().toString(36).slice(2)}`,questId:quest.id,questTitle:quest.cardTitle,stat:sg.stat,dayIndex,title:sg.title,detail:sg.detail||"",value:val,unit:sg.unit,accent:quest.accent,xpMult:quest.xpMult,isPenalty:isFailed,completed:false,failed:false,xpReward:0};
  });
}

function checkAchievements(prev,newState){
  const already=new Set(newState.achievements||[]);
  const newUnlocks=[];
  const totalTasksDone=(newState.log||[]).filter(l=>l.text?.startsWith("✓")).length;
  const bossesDefeated=(newState.bossesDefeated||[]);
  ACHIEVEMENT_CATALOG.forEach(a=>{
    if(already.has(a.id))return;
    let unlock=false;
    if(a.type==="rank"&&getRank(newState.hunter.xp)===a.trigger)unlock=true;
    if(a.type==="stat_rank"){const[st,r]=a.trigger.split(":");if(getStatRank(newState.statXP[st])===r)unlock=true;}
    if(a.type==="streak"&&newState.hunter.streak>=a.trigger)unlock=true;
    if(a.type==="tasks"&&totalTasksDone>=a.trigger)unlock=true;
    if(a.type==="boss_count"&&bossesDefeated.length>=a.trigger)unlock=true;
    if(a.type==="tier_clear"){
      const tierBosses=BOSSES.filter(b=>b.tier===a.trigger).map(b=>b.id);
      if(tierBosses.length&&tierBosses.every(id=>bossesDefeated.includes(id)))unlock=true;
    }
    if(unlock)newUnlocks.push(a.id);
  });
  return newUnlocks;
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App({onSignOut}){
  const [S,setS]=useState(()=>{
    try{
      const s=localStorage.getItem("sl_v8");
      const parsed=s?JSON.parse(s):INIT;
      if(!parsed.nextBossSpawnTime||parsed.nextBossSpawnTime===0)parsed.nextBossSpawnTime=scheduleNextBossMs();
      if(!parsed.bossesDefeated)parsed.bossesDefeated=[];
      if(!parsed.log)parsed.log=[];
      return parsed;
    }catch{return{...INIT,nextBossSpawnTime:scheduleNextBossMs()};}
  });
  const [view,setView]=useState("dashboard");
  const [modal,setModal]=useState(null);
  const [toast,setToast]=useState(null);
  const [cards,setCards]=useState([]);
  const [selCard,setSelCard]=useState(null);
  const [subForms,setSubForms]=useState([]);
  const [newName,setNewName]=useState("");
  const [timeLeft,setTimeLeft]=useState(getMidnightMs());
  const [confirmReset,setConfirmReset]=useState(false);
  const [achievePopup,setAchievePopup]=useState(null);
  const [showBoss,setShowBoss]=useState(false);
  const bossTimerRef=useRef(null);

  useEffect(()=>{try{localStorage.setItem("sl_v8",JSON.stringify(S));backupGameState();}catch(_){}},[S]);
  useEffect(()=>{const iv=setInterval(()=>setTimeLeft(getMidnightMs()),1000);return()=>clearInterval(iv);},[]);
  useEffect(()=>{checkReset();const iv=setInterval(checkReset,60000);return()=>clearInterval(iv);},[]);

  // Boss timer — checks expiry every 5s
  useEffect(()=>{
    if(bossTimerRef.current)clearInterval(bossTimerRef.current);
    bossTimerRef.current=setInterval(()=>{
      setS(prev=>{
        if(!prev.activeBoss||prev.activeBoss.failed||prev.activeBoss.won)return prev;
        const boss=BOSSES.find(b=>b.id===prev.activeBoss.bossId);if(!boss)return prev;
        const elapsed=Date.now()-prev.activeBoss.startTime;
        const remaining=boss.timeLimitMs-elapsed;
        // 30-min warning log
        if(remaining>0&&remaining<=1800000&&!prev.activeBoss.warnedAt30){
          const minsLeft=Math.floor(remaining/60000);
          const logMsg=`⚠ BOSS WARNING: ${boss.name} — only ${minsLeft} minutes left! Complete the tasks now!`;
          return{...prev,activeBoss:{...prev.activeBoss,warnedAt30:true},
            log:[{id:Date.now(),text:logMsg,time:new Date().toLocaleString()},...prev.log].slice(0,100)};
        }
        if(remaining>0)return prev;
        // Boss escaped
        const tasksDone=prev.activeBoss.tasksDone||[];
        const incompleteTasks=boss.tasks.filter(t=>!tasksDone.includes(t.id));
        const statXP={...prev.statXP};
        const lossDetails=[];
        incompleteTasks.forEach(t=>{
          const loss=Math.floor(t.xp*0.5);
          if(statXP[t.stat]!==undefined)statXP[t.stat]=Math.max(0,statXP[t.stat]-loss);
          lossDetails.push(`-${loss} ${STATS[t.stat]?.label||t.stat}`);
        });
        const overallLoss=Math.floor(boss.xpReward*0.20);
        const hunter={...prev.hunter,xp:Math.max(0,prev.hunter.xp-overallLoss)};
        const logMsg=`💀 BOSS ESCAPED: ${boss.name} fled! Overall -${overallLoss} XP. ${lossDetails.join(", ")||"No stat losses."}`;
        setTimeout(()=>playSfx("fail"),100);
        return{...prev,activeBoss:{...prev.activeBoss,failed:true},statXP,hunter,
          log:[{id:Date.now(),text:logMsg,time:new Date().toLocaleString()},...prev.log].slice(0,100)};
      });
    },5000);
    return()=>clearInterval(bossTimerRef.current);
  },[]);

  // Auto boss spawn checker
  useEffect(()=>{
    const iv=setInterval(()=>{
      setS(prev=>{
        if(prev.activeBoss&&!prev.activeBoss.failed&&!prev.activeBoss.won)return prev;
        if(Date.now()<(prev.nextBossSpawnTime||0))return prev;
        const tier=pickRandomBossTier();
        const possible=BOSSES.filter(b=>b.tier===tier);
        const boss=possible[Math.floor(Math.random()*possible.length)];
        const next=scheduleNextBossMs();
        setTimeout(()=>{playSfx("boss");showMsg(`⚔ ${TIERS[tier].label} BOSS: ${boss.name} has appeared!`,"success");setShowBoss(true);},100);
        const logMsg=`⚔ BOSS SPAWNED: [${TIERS[tier].label}] ${boss.name} — ${boss.subtitle}. Time limit: ${boss.timeLimitMs/3600000}h.`;
        return{
          ...prev,
          activeBoss:{bossId:boss.id,startTime:Date.now(),tasksDone:[],failed:false,won:false},
          nextBossSpawnTime:next,
          log:[{id:Date.now(),text:logMsg,time:new Date().toLocaleString()},...prev.log].slice(0,100),
        };
      });
    },15000);
    return()=>clearInterval(iv);
  },[]);

  function checkReset(){
    const today=todayStr();
    setS(prev=>{if(prev.lastResetDate===today)return prev;return doReset(prev,today);});
  }

  function doReset(prev,today){
    const failed={};
    prev.dailyTasks.forEach(t=>{if(!t.completed){if(!failed[t.questId])failed[t.questId]=[];failed[t.questId].push(t.stat);}});
    const totalMissed=Object.values(failed).reduce((a,b)=>a+b.length,0);
    let quests=prev.quests.map(q=>{
      if(!q.active)return q;
      const newSG=q.subGoals.map(sg=>({...sg,dayIndex:(sg.dayIndex||0)+1,done:(sg.dayIndex||0)+1>=sg.durationWeeks*7}));
      return{...q,subGoals:newSG,active:!newSG.every(sg=>sg.done),completed:newSG.every(sg=>sg.done)};
    });
    const newTasks=[];
    quests.forEach(q=>{if(!q.active)return;const pen=failed[q.id]||[];newTasks.push(...genTasks(q,q.subGoals[0]?.dayIndex||0,pen));});
    const wasYesterday=prev.lastResetDate===new Date(Date.now()-86400000).toDateString();
    const newStreak=prev.lastResetDate&&(wasYesterday||totalMissed===0)?prev.hunter.streak+1:0;
    const hunter={...prev.hunter,daysMissed:prev.hunter.daysMissed+(totalMissed>0?1:0),streak:newStreak};
    const resetMsg=`🔄 DAILY RESET — New day: ${today}. Streak: ${newStreak}. ${totalMissed>0?`${totalMissed} task(s) missed — penalty applied.`:"Clean slate!"}`;
    const log=[{id:Date.now(),text:resetMsg,time:new Date().toLocaleString()},...prev.log].slice(0,100);
    return{...prev,quests,dailyTasks:newTasks,hunter,log,lastResetDate:today};
  }

  const rank=getRank(S.hunter.xp);
  const rc=RANK_COLORS[rank];
  const xi=getXPInfo(S.hunter.xp);

  function showMsg(msg,type){setToast({msg,type:type||"info"});setTimeout(()=>setToast(null),2800);}

  function triggerAchievePopup(ids){
    if(!ids||!ids.length)return;
    const first=ids[0];
    let a=ACHIEVEMENT_CATALOG.find(a=>a.id===first);
    if(!a)BOSSES.forEach(b=>{if(b.achDrop?.id===first)a=b.achDrop;});
    if(a){setAchievePopup(a);setTimeout(()=>setAchievePopup(null),4000);playSfx("levelup");}
  }

  function addLog(text){
    setS(prev=>({...prev,log:[{id:Date.now(),text,time:new Date().toLocaleString()},...prev.log].slice(0,100)}));
  }

  function completeTask(id){
    setS(prev=>{
      const t=prev.dailyTasks.find(dt=>dt.id===id);if(!t)return prev;
      const buffXP=calcTaskXP(t,prev.achievements||[]);
      const dailyTasks=prev.dailyTasks.map(dt=>dt.id===id?{...dt,completed:true,xpReward:buffXP}:dt);
      const statXP={...prev.statXP};if(statXP[t.stat]!==undefined)statXP[t.stat]+=buffXP;
      const oldRank=getRank(prev.hunter.xp);
      const hunter={...prev.hunter,xp:prev.hunter.xp+buffXP,totalXP:prev.hunter.totalXP+buffXP,tasksCompleted:(prev.hunter.tasksCompleted||0)+1};
      const newRank=getRank(hunter.xp);
      const log=[{id:Date.now(),text:`✓ ${t.title}: ${t.value} ${t.unit} (+${buffXP} XP)`,time:new Date().toLocaleString()},...prev.log].slice(0,100);
      const ns={...prev,dailyTasks,statXP,hunter,log};
      const newAch=checkAchievements(prev,ns);
      if(newRank!==oldRank){setTimeout(()=>{playSfx("levelup");showMsg(`⬆ RANK UP! Now Rank ${newRank}`,"success");},200);}
      if(newAch.length){
        const achLog=[{id:Date.now()+1,text:`🏆 Achievement unlocked: ${newAch.map(id=>{const a=ACHIEVEMENT_CATALOG.find(a=>a.id===id);return a?.name||id;}).join(", ")}`,time:new Date().toLocaleString()},...ns.log].slice(0,100);
        setTimeout(()=>triggerAchievePopup(newAch),500);
        return{...ns,achievements:[...(ns.achievements||[]),...newAch],log:achLog};
      }
      return{...ns,achievements:[...(ns.achievements||[]),...newAch]};
    });
    playSfx("success");showMsg("Task complete! XP gained.","success");
  }

  function failTask(id){
    setS(prev=>{
      const t=prev.dailyTasks.find(dt=>dt.id===id);if(!t)return prev;
      const dailyTasks=prev.dailyTasks.map(dt=>dt.id===id?{...dt,failed:true}:dt);
      const wouldHaveEarned=calcTaskXP(t,prev.achievements||[]);
      const statLoss=Math.floor(wouldHaveEarned*0.50);
      const overallLoss=Math.floor(wouldHaveEarned*0.75);
      const statXP={...prev.statXP};
      if(t.stat&&statXP[t.stat]!==undefined)statXP[t.stat]=Math.max(0,statXP[t.stat]-statLoss);
      const newXP=Math.max(0,prev.hunter.xp-overallLoss);
      const hunter={...prev.hunter,xp:newXP,streak:0,daysMissed:prev.hunter.daysMissed+1};
      const logText=`✗ FAILED: ${t.title} — -${statLoss} ${STATS[t.stat]?.label||""} XP · -${overallLoss} Overall XP · tomorrow +30%`;
      const log=[{id:Date.now(),text:logText,time:new Date().toLocaleString()},...prev.log].slice(0,100);
      return{...prev,dailyTasks,statXP,hunter,log};
    });
    playSfx("fail");showMsg("Task failed — XP lost, tomorrow harder.","danger");
  }

  function spawnBoss(tier){
    const possible=BOSSES.filter(b=>b.tier===tier);
    const boss=possible[Math.floor(Math.random()*possible.length)];
    setS(prev=>({
      ...prev,
      activeBoss:{bossId:boss.id,startTime:Date.now(),tasksDone:[],failed:false,won:false},
      nextBossSpawnTime:scheduleNextBossMs(),
      log:[{id:Date.now(),text:`⚔ BOSS SPAWNED (manual): [${TIERS[tier].label}] ${boss.name} — ${boss.subtitle}`,time:new Date().toLocaleString()},...prev.log].slice(0,100),
    }));
    playSfx("boss");setShowBoss(true);
  }

  function completeBossTask(taskId){
    setS(prev=>{
      if(!prev.activeBoss||prev.activeBoss.failed||prev.activeBoss.won)return prev;
      const boss=BOSSES.find(b=>b.id===prev.activeBoss.bossId);if(!boss)return prev;
      const tasksDone=[...prev.activeBoss.tasksDone,taskId];
      const allDone=boss.tasks.every(t=>tasksDone.includes(t.id));
      const bossTask=boss.tasks.find(t=>t.id===taskId);
      const xp=bossTask?Math.round(bossTask.xp*(prev.achievements?getBuffMult(prev.achievements,bossTask.stat):1)):0;
      const statXP={...prev.statXP};
      if(bossTask&&statXP[bossTask.stat]!==undefined)statXP[bossTask.stat]+=xp;
      const oldRank=getRank(prev.hunter.xp);
      const hunter={...prev.hunter,xp:prev.hunter.xp+xp,totalXP:prev.hunter.totalXP+xp};
      const newRank=getRank(hunter.xp);
      let activeBoss={...prev.activeBoss,tasksDone};
      let newTitles=[...(prev.titles||[])];
      let newAch=[...(prev.achievements||[])];
      let bossesDefeated=[...(prev.bossesDefeated||[])];
      let logEntries=[{id:Date.now(),text:`⚔ Boss task: ${bossTask?.desc||taskId} (+${xp} XP)`,time:new Date().toLocaleString()}];

      if(allDone){
        activeBoss={...activeBoss,won:true};
        const bonusXP=boss.xpReward;
        hunter.xp+=bonusXP;hunter.totalXP+=bonusXP;
        if(!bossesDefeated.includes(boss.id))bossesDefeated.push(boss.id);
        logEntries.unshift({id:Date.now()+2,text:`🏆 BOSS DEFEATED: ${boss.name} [${boss.tier.toUpperCase()}] +${bonusXP} XP!`,time:new Date().toLocaleString()});
        // Title drop (5%)
        if(boss.titleDrop&&Math.random()<0.05&&!newTitles.includes(boss.titleDrop)){
          newTitles.push(boss.titleDrop);
          logEntries.unshift({id:Date.now()+3,text:`✨ TITLE DROPPED: "${boss.titleDrop}" — rare reward!`,time:new Date().toLocaleString()});
          setTimeout(()=>{playSfx("title");showMsg(`Title dropped: "${boss.titleDrop}"!`,"success");},600);
        }
        // Achievement drop (5%)
        if(boss.achDrop&&Math.random()<0.05&&!newAch.includes(boss.achDrop.id)){
          newAch.push(boss.achDrop.id);
          logEntries.unshift({id:Date.now()+4,text:`🏆 ACHIEVEMENT DROPPED: "${boss.achDrop.name}" — ${boss.achDrop.desc}`,time:new Date().toLocaleString()});
          setTimeout(()=>triggerAchievePopup([boss.achDrop.id]),900);
        }
        setTimeout(()=>{playSfx("epic");showMsg(`Boss defeated! +${bonusXP} XP`,"success");},300);
      }
      if(newRank!==oldRank){
        logEntries.unshift({id:Date.now()+5,text:`⬆ RANK UP: Now Rank ${newRank}!`,time:new Date().toLocaleString()});
        setTimeout(()=>{playSfx("levelup");showMsg(`⬆ RANK UP! Now Rank ${newRank}`,"success");},400);
      }
      const nsBase={...prev,activeBoss,statXP,hunter,bossesDefeated,log:[...logEntries,...prev.log].slice(0,100),titles:newTitles,achievements:newAch};
      const extraAch=checkAchievements(prev,nsBase);
      if(extraAch.length){
        setTimeout(()=>triggerAchievePopup(extraAch),1000);
        const achLog={id:Date.now()+6,text:`🏆 Achievement unlocked: ${extraAch.map(id=>{const a=ACHIEVEMENT_CATALOG.find(a=>a.id===id);return a?.name||id;}).join(", ")}`,time:new Date().toLocaleString()};
        return{...nsBase,achievements:[...newAch,...extraAch],log:[achLog,...nsBase.log].slice(0,100)};
      }
      return nsBase;
    });
    playSfx("success");
  }

  function openQuestPicker(){playSfx("click");setCards(pickCards(3));setSelCard(null);setSubForms([]);setModal("pick");}
  function selectCard(card){playSfx("click");setSelCard(card);setSubForms(card.stats.map(s=>({stat:s,title:"",detail:"",target:"",unit:"",startValue:"",durationWeeks:String(STATS[s].defaultWeeks)})));}
  function updateSub(idx,field,val){setSubForms(prev=>prev.map((f,i)=>i===idx?{...f,[field]:val}:f));}

  function submitQuest(){
    if(!selCard)return;
    for(const sg of subForms){if(!sg.title.trim()){showMsg(`Enter a name for ${STATS[sg.stat].label} task`,"danger");return;}if(!parseFloat(sg.target)||parseFloat(sg.target)<=0){showMsg(`Enter a target for ${sg.title||sg.stat}`,"danger");return;}}

  function equipTitle(t){setS(prev=>{const newTitle=prev.equippedTitle===t?null:t;return{...prev,equippedTitle:newTitle,log:[{id:Date.now(),text:`👑 Title ${newTitle?"equipped":"unequipped"}: "${t}"`,time:new Date().toLocaleString()},...prev.log].slice(0,100)};});playSfx("click");}

  const C={
    app:{background:"#07070f",minHeight:"100vh",color:"#e0d8cc",fontFamily:"'Courier New',monospace",fontSize:13},
    header:{background:"#0a0a18",borderBottom:"1px solid #1e1e35",padding:"12px 14px"},
    nav:{display:"flex",borderBottom:"1px solid #1e1e35",background:"#080815"},
    navBtn:(v)=>({flex:1,padding:"9px 0",background:"none",border:"none",color:view===v?rc:"#3a3a5a",fontSize:"7.5px",letterSpacing:1,textTransform:"uppercase",cursor:"pointer",borderBottom:view===v?"2px solid "+rc:"2px solid transparent",transition:"color 0.2s"}),
    content:{padding:"14px 14px 100px"},
    sysMsg:{fontSize:11,color:"#6a5a8a",letterSpacing:1,marginBottom:14,padding:"7px 10px",borderLeft:"2px solid #3a2a5a",background:"rgba(167,139,250,0.04)"},
    sh:(c)=>({fontSize:9,color:c,letterSpacing:3,marginBottom:8}),

    box:{background:"#0c0c1c",border:"1px solid #3a2a6a",borderRadius:6,padding:18,width:"100%",maxWidth:400,marginTop:14,marginBottom:14},
    inp:{width:"100%",background:"#0d0d1c",border:"1px solid #2a2a4a",color:"#e0d8cc",padding:"8px 10px",borderRadius:3,fontSize:12,marginBottom:8,boxSizing:"border-box",fontFamily:"'Courier New',monospace",outline:"none"},
    lbl:{fontSize:9,color:"#7a6a9a",letterSpacing:2,display:"block",marginBottom:3,textTransform:"uppercase"},

      {/* Header */}
      <div style={C.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,color:"#3a3a5a",letterSpacing:3}}>SYSTEM</div>
            <div style={{fontSize:13,fontWeight:"bold",color:rc,letterSpacing:1}}>
              [{rank}] {S.hunter.name}{S.equippedTitle&&<span style={{color:"#f59e0b",fontSize:10}}> ({S.equippedTitle})</span>}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#3a3a5a"}}>TOTAL XP</div>

          </div>

      {toast&&<div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",background:toast.type==="success"?"#0f2a0f":toast.type==="danger"?"#2a0f0f":"#0f0f2a",border:"1px solid "+(toast.type==="success"?"#4ade80":toast.type==="danger"?"#ef4444":"#a78bfa"),padding:"8px 18px",borderRadius:4,fontSize:12,color:"#e0d8cc",zIndex:200,whiteSpace:"nowrap",pointerEvents:"none"}}>{toast.msg}</div>}

      {achievePopup&&(

        const tasksDone=S.activeBoss.tasksDone||[];
        const won=S.activeBoss.won,failed=S.activeBoss.failed;
        const hpDealt=tasksDone.reduce((acc,tid)=>{const ti=boss.tasks.findIndex(t=>t.id===tid);return acc+(ti>=0?getBossDamage(boss,ti):0);},0);
        const hpRemaining=Math.max(0,100-hpDealt);
        return(
          <div style={{...C.overlay,zIndex:150}}>
            <div style={{...C.box,border:`1px solid ${boss.color}`,background:boss.bgColor,maxWidth:420}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                <div>
                  <div style={{fontSize:8,color:TIERS[boss.tier].color,letterSpacing:3}}>{TIERS[boss.tier].label} BOSS</div>
                  <div style={{fontSize:14,fontWeight:"bold",color:boss.color}}>{boss.name}</div>
                  <div style={{fontSize:10,color:"#5a5a7a",marginTop:1}}>{boss.subtitle}</div>

                <button style={{background:"none",border:"none",color:"#6a6a8a",fontSize:18,cursor:"pointer"}} onClick={()=>{playSfx("click");setShowBoss(false);}}>✕</button>

              <div style={{textAlign:"center",marginBottom:12}}>

      {/* Card picker */}

          <div style={C.box}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

      {/* Quest form */}
      {modal==="form"&&selCard&&(
        <div style={C.overlay}>
          <div style={C.box}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>

                <div style={{fontSize:9,letterSpacing:2,color:"#4a4a6a",marginBottom:2}}>CONFIGURE TRIAL</div>

              </div>
              <button style={{background:"none",border:"none",color:"#6a6a8a",fontSize:15,cursor:"pointer"}} onClick={()=>{playSfx("click");setModal("pick");}}>← BACK</button>

            <div style={{fontSize:9,color:TIERS[selCard.tier].color,padding:"5px 9px",background:"rgba(0,0,0,0.3)",borderRadius:3,border:"1px solid #1e1e35",marginBottom:14,letterSpacing:1}}>{TIERS[selCard.tier].label} · ×{TIERS[selCard.tier].xpMult} XP · {selCard.stats.length} stat{selCard.stats.length>1?"s":""}</div>
            {subForms.map((sg,idx)=>{
              const stat=STATS[sg.stat];const mode=stat?.mode||"incremental";
              const rec=getRecommendedStart(sg.stat,sg.target,sg.unit);
              const weeks=parseInt(sg.durationWeeks)||stat.defaultWeeks||4;
              const totalDays=weeks*7;
              const previewVal=sg.target&&parseFloat(sg.target)>0?getDailyValue({stat:sg.stat,target:parseFloat(sg.target),startValue:sg.startValue!==""?parseFloat(sg.startValue):undefined},0,totalDays,1.0):null;
              return(
                <div key={sg.stat} style={{background:"rgba(0,0,0,0.25)",border:`1px solid ${stat.color}28`,borderRadius:5,padding:"12px",marginBottom:12}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:10}}>
                    <span style={{fontSize:17}}>{stat.icon}</span>
                    <div style={{flex:1}}><div style={{fontSize:10,fontWeight:"bold",color:stat.color,letterSpacing:1}}>{stat.label.toUpperCase()}</div><div style={{fontSize:9,color:"#4a4a6a"}}>{stat.desc}</div></div>
                    <div style={{fontSize:8,padding:"2px 6px",borderRadius:2,border:"1px solid #2a2a4a",color:mode==="flat"?"#818cf8":"#4ade80",whiteSpace:"nowrap"}}>{mode==="flat"?"DAILY HABIT":"PROGRESSIVE"}</div>
                  </div>
                  <label style={C.lbl}>What will you do? *</label>
                  <input style={C.inp} placeholder={stat.exampleGoals?.[0]||"e.g. "+stat.label+" activity"} value={sg.title} onChange={e=>updateSub(idx,"title",e.target.value)}/>
                  <label style={C.lbl}>Notes (optional)</label>
                  <input style={C.inp} placeholder="e.g. proper form, no excuses" value={sg.detail} onChange={e=>updateSub(idx,"detail",e.target.value)}/>

                    <div><label style={C.lbl}>Unit</label><input style={{...C.inp,marginBottom:0}} placeholder="reps" value={sg.unit} onChange={e=>updateSub(idx,"unit",e.target.value)}/>{stat.unitHints?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:4}}>{stat.unitHints.map(u=><span key={u} onClick={()=>updateSub(idx,"unit",u)} style={{fontSize:8,padding:"1px 5px",borderRadius:2,border:"1px solid #2a2a4a",color:"#5a5a8a",cursor:"pointer"}}>{u}</span>)}</div>}</div>
                    <div><label style={C.lbl}>Weeks</label><input style={{...C.inp,marginBottom:0}} type="number" min="1" max="52" value={sg.durationWeeks} onChange={e=>updateSub(idx,"durationWeeks",e.target.value)}/></div>
                  </div>
                  {mode!=="flat"&&sg.target&&parseFloat(sg.target)>0&&(
                    <div style={{background:"rgba(0,0,0,0.3)",border:"1px solid #1e1e30",borderRadius:4,padding:"10px 11px",marginTop:4}}>
                      <label style={{...C.lbl,color:"#a78bfa",marginBottom:6}}>STARTING VALUE</label>
                      {rec&&(<div style={{marginBottom:8}}><div style={{fontSize:9,color:"#6a8a6a",lineHeight:1.5,marginBottom:6}}>{rec.reason}</div><button onClick={()=>updateSub(idx,"startValue",String(rec.value))} style={{fontSize:9,padding:"4px 10px",border:"1px solid #4ade80",borderRadius:2,background:"rgba(74,222,128,0.08)",color:"#4ade80",cursor:"pointer",fontFamily:"'Courier New',monospace",letterSpacing:1}}>✓ USE RECOMMENDED: {rec.value} {sg.unit||""}</button></div>)}
                      <input style={{...C.inp,marginBottom:0}} type="number" min="0" step="0.1" placeholder="Enter your starting value" value={sg.startValue} onChange={e=>updateSub(idx,"startValue",e.target.value)}/>
                      {previewVal!==null&&(<div style={{fontSize:9,color:"#4a4a7a",marginTop:6,display:"flex",gap:12}}><span>Day 1: <span style={{color:stat.color}}>{previewVal} {sg.unit||"reps"}</span></span><span>Final: <span style={{color:"#a78bfa"}}>{sg.target} {sg.unit||"reps"}</span></span><span>Days: <span style={{color:"#6a6a8a"}}>{totalDays}</span></span></div>)}
                    </div>
                  )}
                  {mode==="flat"&&<div style={{fontSize:9,color:"#5a5a7a",marginTop:6,padding:"6px 9px",background:"rgba(167,139,250,0.05)",borderRadius:3,border:"1px solid #1e1e30"}}>Daily target is fixed — this is a consistency habit.</div>}
                </div>
              );
            })}
            <button style={{width:"100%",padding:"12px",border:"none",borderRadius:3,fontSize:12,cursor:"pointer",letterSpacing:2,fontFamily:"'Courier New',monospace",background:selCard.accent,color:"#07070f",fontWeight:"bold",marginTop:4}} onClick={()=>{playSfx("click");submitQuest();}}>⚔ BEGIN TRIAL</button>

      {/* Settings */}
      {modal==="settings"&&(
        <div style={C.overlay}>
          <div style={C.box}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontSize:11,letterSpacing:3,color:"#a78bfa"}}>SETTINGS</div>

                <button style={{width:"100%",padding:"7px",border:"1px solid #3a3a5a",borderRadius:3,fontSize:10,cursor:"pointer",fontFamily:"'Courier New',monospace",background:"none",color:"#6a6a8a",letterSpacing:1}} onClick={()=>{playSfx("click");setModal(null);onSignOut();}}>SIGN OUT</button>
              </div>
            )}
            <label style={C.lbl}>Hunter Name</label>
            <input style={C.inp} value={newName} onChange={e=>setNewName(e.target.value)}/>
            <button style={{width:"100%",padding:10,border:"none",borderRadius:3,fontSize:11,cursor:"pointer",letterSpacing:2,fontFamily:"'Courier New',monospace",background:"#a78bfa",color:"#07070f",marginBottom:10}} onClick={()=>{playSfx("click");doRename();}}>UPDATE NAME</button>
            <div style={{borderTop:"1px solid #1e1e35",paddingTop:12}}/>
            {!confirmReset
              ?<button style={{width:"100%",padding:10,border:"1px solid #3a1a1a",borderRadius:3,fontSize:11,cursor:"pointer",letterSpacing:2,fontFamily:"'Courier New',monospace",background:"#1a0808",color:"#ef4444",marginTop:10}} onClick={()=>{playSfx("click");setConfirmReset(true);}}>RESET ALL DATA</button>

                <div style={{fontSize:11,color:"#ef4444",marginBottom:10,textAlign:"center"}}>⚠ This cannot be undone.</div>
                <div style={{display:"flex",gap:8}}>
                  <button style={{flex:1,padding:9,border:"1px solid #3a3a5a",borderRadius:3,fontSize:11,cursor:"pointer",fontFamily:"'Courier New',monospace",background:"none",color:"#6a6a8a"}} onClick={()=>{playSfx("click");setConfirmReset(false);}}>CANCEL</button>
                  <button style={{flex:1,padding:9,border:"none",borderRadius:3,fontSize:11,cursor:"pointer",fontFamily:"'Courier New',monospace",background:"#ef4444",color:"#07070f",fontWeight:"bold"}} onClick={()=>{playSfx("click");doFullReset();}}>CONFIRM</button>
                </div>
              </div>
            }
          </div>
        </div>
      )}
    </div>
  );
}

// ─── BOSS TIMER ───────────────────────────────────────────────────────────────
function BossTimer({boss,startTime,tasksDone,large=false}){
  const [ms,setMs]=useState(Math.max(0,boss.timeLimitMs-(Date.now()-startTime)));
  useEffect(()=>{const iv=setInterval(()=>setMs(Math.max(0,boss.timeLimitMs-(Date.now()-startTime))),1000);return()=>clearInterval(iv);},[startTime,boss.timeLimitMs]);
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  const str=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const urgent=ms<600000;
  return large?(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",marginBottom:10}}>
      <span style={{fontSize:9,color:"#3a3a5a",letterSpacing:2}}>TIME REMAINING</span>
      <span className={urgent?"timer-urgent":""} style={{fontSize:16,fontWeight:"bold",color:urgent?"#ef4444":"#f59e0b",fontVariantNumeric:"tabular-nums"}}>{str}</span>
    </div>
  ):(
    <div className={urgent?"timer-urgent":""} style={{fontSize:10,color:urgent?"#ef4444":"#f59e0b",fontVariantNumeric:"tabular-nums"}}>{str}</div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({activeTasks,completedTasks,allTasks,onComplete,onFail,rc,C,onSpawnBoss,activeBoss,nextBossSpawnTime}){
  const groups={};
  activeTasks.forEach(t=>{if(!groups[t.questId])groups[t.questId]={title:t.questTitle,accent:t.accent,tasks:[]};groups[t.questId].tasks.push(t);});
  const bossActive=activeBoss&&!activeBoss.failed&&!activeBoss.won;
  const [bossCountdown,setBossCountdown]=useState("");
  useEffect(()=>{
    const iv=setInterval(()=>{
      const ms=Math.max(0,(nextBossSpawnTime||0)-Date.now());
      const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
      setBossCountdown(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    },1000);
    return()=>clearInterval(iv);
  },[nextBossSpawnTime]);
  return(
    <div>
      <div style={C.sysMsg}>▶ Complete your daily trials before midnight. The system watches.</div>
      {!bossActive&&(
        <div style={{background:"rgba(239,68,68,0.05)",border:"1px solid #3a1a1a",borderRadius:5,padding:"12px 14px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:9,color:"#ef4444",letterSpacing:2,marginBottom:4}}>⚔ BOSS ENCOUNTER</div>
              <div style={{fontSize:10,color:"#5a5a7a",lineHeight:1.5}}>A boss will appear at a random time.</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:8,color:"#3a3a5a",letterSpacing:1,marginBottom:2}}>NEXT BOSS IN</div>
              <div style={{fontSize:14,color:"#f59e0b",fontVariantNumeric:"tabular-nums",fontWeight:"bold"}}>{bossCountdown}</div>
            </div>
          </div>
        </div>
      )}
      {allTasks.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#3a3a5a"}}><div style={{fontSize:28,marginBottom:8}}>⚔</div><div style={{fontSize:12}}>No daily quests active.</div><div style={{fontSize:10,marginTop:3}}>Tap + to choose a trial archetype.</div></div>}
      {Object.values(groups).some(g=>g.tasks.some(t=>t.isPenalty))&&(<><div style={C.sh("#ef4444")}>⚠ PENALTY TASKS</div>{Object.entries(groups).filter(([,g])=>g.tasks.some(t=>t.isPenalty)).map(([id,g])=><QGroup key={id} group={g} onComplete={onComplete} onFail={onFail}/>)}</>)}
      {Object.values(groups).some(g=>g.tasks.some(t=>!t.isPenalty))&&(<><div style={C.sh(rc)}>TODAY'S TASKS</div>{Object.entries(groups).filter(([,g])=>g.tasks.some(t=>!t.isPenalty)).map(([id,g])=><QGroup key={id} group={g} onComplete={onComplete} onFail={onFail}/>)}</>)}
      {completedTasks.length>0&&(<><div style={C.sh("#3a3a5a")}>COMPLETED TODAY</div>{completedTasks.map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",marginBottom:5,borderLeft:`2px solid ${STATS[t.stat]?.color||"#4ade80"}`,opacity:0.5}}><span style={{fontSize:11,textDecoration:"line-through",color:"#3a5a3a"}}>{STATS[t.stat]?.icon} {t.title} · {t.value} {t.unit}</span><span style={{color:"#4ade80",fontSize:10}}>+{t.xpReward} XP</span></div>)}</>)}
    </div>
  );
}

function QGroup({group,onComplete,onFail}){
  const [open,setOpen]=useState(true);
  return(
    <div style={{background:`rgba(${hexToRgb(group.accent)},0.04)`,border:"1px solid #252540",borderRadius:5,marginBottom:12,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 11px",cursor:"pointer",borderBottom:open?"1px solid #1e1e30":"none"}} onClick={()=>{playSfx("click");setOpen(o=>!o);}}>
        <div style={{fontSize:10,color:group.accent,fontWeight:"bold",letterSpacing:1}}>{group.title}</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:9,color:"#3a3a5a"}}>{group.tasks.filter(t=>t.completed).length}/{group.tasks.length}</span><span style={{color:group.accent,fontSize:10}}>{open?"▲":"▼"}</span></div>
      </div>
      {open&&group.tasks.map(t=><TaskRow key={t.id} task={t} onComplete={onComplete} onFail={onFail}/>)}
    </div>
  );
}

function TaskRow({task,onComplete,onFail}){
  const [open,setOpen]=useState(false);
  const sc=STATS[task.stat]?.color||"#a78bfa";
  const mode=STATS[task.stat]?.mode||"incremental";
  return(
    <div style={{borderBottom:"1px solid #1a1a28"}}>
      <div style={{display:"flex",alignItems:"center",padding:"9px 11px",cursor:"pointer",gap:8}} onClick={()=>{playSfx("click");setOpen(o=>!o);}}>
        <span style={{fontSize:14}}>{STATS[task.stat]?.icon}</span>
        <div style={{flex:1}}>
          {task.isPenalty&&<div style={{fontSize:8,color:"#ef4444",letterSpacing:2,marginBottom:1}}>⚠ PENALTY</div>}
          <div style={{fontSize:11,color:"#e0d8cc"}}>{task.title}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
            <span style={{fontSize:11,color:sc,fontWeight:"bold"}}>{task.value} {task.unit}</span>
            <span style={{fontSize:8,padding:"1px 5px",borderRadius:2,border:"1px solid #1e1e35",color:"#3a3a5a"}}>{mode==="flat"?"HABIT":"DAY "+(task.dayIndex+1)}</span>
          </div>
        </div>
        <div style={{textAlign:"right"}}><div style={{fontSize:8,color:"#3a3a5a"}}>{STATS[task.stat]?.label}</div><div style={{fontSize:9,color:"#4a4a7a",marginTop:1}}>~{calcTaskXP(task)} XP</div></div>
        <div style={{color:sc,fontSize:10,marginLeft:3}}>{open?"▲":"▼"}</div>
      </div>
      {open&&<div style={{padding:"0 11px 11px",paddingTop:8,borderTop:"1px solid #1a1a28"}}>
        {task.detail&&<div style={{fontSize:10,color:"#5a5a7a",marginBottom:8}}>{task.detail}</div>}
        <div style={{display:"flex",gap:7}}>
          <button style={{flex:1,background:"#0f2a0f",border:"1px solid #4ade80",color:"#4ade80",padding:9,borderRadius:3,fontSize:11,cursor:"pointer",letterSpacing:1,fontFamily:"'Courier New',monospace"}} onClick={e=>{e.stopPropagation();onComplete(task.id);}}>✓ DONE</button>
          <button style={{flex:1,background:"#2a0f0f",border:"1px solid #ef4444",color:"#ef4444",padding:9,borderRadius:3,fontSize:11,cursor:"pointer",letterSpacing:1,fontFamily:"'Courier New',monospace"}} onClick={e=>{e.stopPropagation();onFail(task.id);}}>✗ FAILED</button>
        </div>
      </div>}
    </div>
  );
}

// ─── STATS VIEW ───────────────────────────────────────────────────────────────
function StatsView({statXP,hunter,achievements,rc,C}){
  const ovRank=getRank(hunter.xp);
  return(
    <div>
      <div style={C.sysMsg}>▶ Status window. True power revealed.</div>
      <div style={{background:"rgba(167,139,250,0.07)",border:"1px solid #2a2a4a",borderRadius:6,padding:"14px",marginBottom:18,textAlign:"center"}}>
        <div style={{fontSize:9,color:"#4a4a6a",letterSpacing:3,marginBottom:4}}>OVERALL RANK</div>

        });
        const entries=Object.entries(buffs);
        if(!entries.length)return null;
        return(<div style={{background:"rgba(74,222,128,0.05)",border:"1px solid #1a3a1a",borderRadius:4,padding:"10px 12px",marginBottom:14}}>
          <div style={{fontSize:9,color:"#4ade80",letterSpacing:2,marginBottom:6}}>⚡ ACTIVE BUFFS</div>

        const nextXP=STAT_RANK_XP[getStatRankIdx(xp)+1];
        const buff=getBuffMult(achievements,key);
        return(
          <div key={key} style={{background:"rgba(0,0,0,0.3)",border:"1px solid #1e1e30",borderRadius:4,padding:"10px 12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:17}}>{cat.icon}</span>
                <div><div style={{fontSize:11,color:cat.color,letterSpacing:1}}>{cat.label}{buff>1&&<span style={{fontSize:8,color:"#4ade80",marginLeft:5}}>+{Math.round((buff-1)*100)}% XP</span>}</div><div style={{fontSize:9,color:"#3a3a5a"}}>{cat.desc}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>

              </div>

            <div style={{height:2,background:"#1a1a2e",borderRadius:1}}><div style={{height:"100%",width:pct+"%",background:cat.color,borderRadius:1,transition:"width 0.5s",boxShadow:`0 0 4px ${cat.color}`}}/></div>

// ─── QUESTS VIEW ──────────────────────────────────────────────────────────────
function QuestsView({quests,dailyTasks,rc,C}){
  return(
    <div>
      <div style={C.sysMsg}>▶ Active trials. Long-term progress.</div>
      {quests.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:"#3a3a5a",fontSize:12}}>No quests yet. Tap + to begin.</div>}
      {quests.map(q=>{
        const tier=TIERS[q.tier||"common"];
        return(
          <div key={q.id} style={{background:q.completed?"rgba(74,222,128,0.04)":tier.bg,border:`1px solid ${q.completed?"#1a3a1a":tier.border}`,borderRadius:5,padding:"12px 13px",marginBottom:11,boxShadow:tier.glow}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><div style={{fontSize:8,color:tier.color,letterSpacing:2,marginBottom:2}}>{tier.label}</div><div style={{fontSize:13,color:q.completed?"#4ade80":"#e0d8cc",fontWeight:"bold"}}>{q.cardIcon} {q.cardTitle}</div></div>
              <div style={{color:q.completed?"#4ade80":(q.accent||rc),fontSize:9,padding:"3px 8px",borderRadius:3,border:`1px solid ${q.completed?"#4ade80":(q.accent||rc)}`}}>{q.completed?"COMPLETE":"ACTIVE"}</div>
            </div>
            {(q.subGoals||[]).map(sg=>{
              const mode=STATS[sg.stat]?.mode||"incremental";
              const totalDays=sg.durationWeeks*7,day=sg.dayIndex||0,pct=Math.min(100,Math.round((day/totalDays)*100));
              const todayTask=dailyTasks.find(t=>t.questId===q.id&&t.stat===sg.stat&&!t.completed&&!t.failed);
              return(
                <div key={sg.stat} style={{padding:"7px 0",borderTop:"1px solid #1a1a2a"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:12}}>{STATS[sg.stat]?.icon}</span>
                      <div><div style={{fontSize:10,color:"#b0a8c0"}}>{sg.title}</div><div style={{fontSize:8,color:"#3a3a5a"}}>{mode==="flat"?`${sg.target} ${sg.unit} daily`:`${sg.startValue||0} → ${sg.target} ${sg.unit}`} · {sg.durationWeeks}w</div></div>
                    </div>
                    <div style={{textAlign:"right"}}>{todayTask&&<div style={{fontSize:9,color:STATS[sg.stat]?.color}}>Today: {todayTask.value} {sg.unit}</div>}<div style={{fontSize:8,color:"#3a3a5a"}}>Day {day}/{totalDays}</div></div>
                  </div>
                  <div style={{height:2,background:"#1a1a2e",borderRadius:1}}><div style={{height:"100%",width:pct+"%",background:STATS[sg.stat]?.color||"#a78bfa",borderRadius:1}}/></div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ─── BOSSES VIEW (new) ────────────────────────────────────────────────────────
function BossesView({bosses,bossesDefeated,activeBoss,onSpawnBoss,onViewBoss,C,rc}){
  const [filter,setFilter]=useState("all");
  const tiers=["all","common","uncommon","rare","epic","legendary","mythic"];
  const tierColors={all:rc,common:"#888",uncommon:"#4ade80",rare:"#60a5fa",epic:"#a78bfa",legendary:"#f59e0b",mythic:"#ec4899"};
  const filtered=filter==="all"?bosses:bosses.filter(b=>b.tier===filter);
  const bossActive=activeBoss&&!activeBoss.failed&&!activeBoss.won;

  return(
    <div>
      <div style={C.sysMsg}>▶ Boss compendium. {bossesDefeated.length}/{bosses.length} defeated.</div>
      <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {tiers.map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{padding:"4px 10px",background:filter===t?`rgba(${hexToRgb(tierColors[t]||rc)},0.2)`:"none",border:`1px solid ${filter===t?(tierColors[t]||rc):"#2a2a4a"}`,color:filter===t?(tierColors[t]||rc):"#4a4a6a",borderRadius:3,fontSize:9,cursor:"pointer",letterSpacing:1,fontFamily:"'Courier New',monospace",whiteSpace:"nowrap",textTransform:"uppercase"}}>{t}</button>
        ))}
      </div>
      <div style={{display:"grid",gap:10}}>
        {filtered.map(boss=>{
          const defeated=bossesDefeated.includes(boss.id);
          const isActive=activeBoss?.bossId===boss.id&&!activeBoss.failed&&!activeBoss.won;
          const tier=TIERS[boss.tier];
          return(
            <div key={boss.id} style={{background:isActive?boss.bgColor:defeated?"rgba(74,222,128,0.04)":tier.bg,border:`1px solid ${isActive?boss.color:defeated?"#1a3a1a":tier.border}`,borderRadius:5,padding:"12px 13px",boxShadow:isActive?`0 0 12px ${boss.color}44`:tier.glow,opacity:defeated&&!isActive?0.7:1}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <BossSprite type={boss.sprite} size={40}/>
                  <div>
                    <div style={{fontSize:8,color:tier.color,letterSpacing:2}}>{tier.label}</div>
                    <div style={{fontSize:12,fontWeight:"bold",color:isActive?boss.color:defeated?"#4ade80":"#e0d8cc"}}>{boss.name}</div>
                    <div style={{fontSize:9,color:"#4a4a6a"}}>{boss.subtitle}</div>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:10,color:"#a78bfa",fontWeight:"bold"}}>+{boss.xpReward} XP</div>
                  <div style={{fontSize:8,color:"#3a3a5a"}}>{boss.timeLimitMs/3600000}h limit</div>
                  {defeated&&<div style={{fontSize:9,color:"#4ade80",marginTop:3}}>✓ DEFEATED</div>}
                  {isActive&&<div style={{fontSize:9,color:boss.color,marginTop:3}}>⚔ ACTIVE</div>}
                </div>
              </div>
              <div style={{fontSize:9,color:"#4a4a6a",marginBottom:8}}>{boss.tasks.length} tasks · {boss.titleDrop?`Title: "${boss.titleDrop}" (5%)`:""} {boss.achDrop?`· Ach: "${boss.achDrop.name}" (5%)`:""}</div>
              {isActive?(
                <button onClick={onViewBoss} style={{width:"100%",padding:"7px",border:`1px solid ${boss.color}`,borderRadius:3,background:`rgba(${hexToRgb(boss.color)},0.1)`,color:boss.color,fontSize:10,cursor:"pointer",fontFamily:"'Courier New',monospace",letterSpacing:1}}>VIEW ACTIVE BOSS →</button>
              ):!bossActive&&!defeated?(
                <button onClick={()=>onSpawnBoss(boss.tier)} style={{width:"100%",padding:"7px",border:"1px solid #3a3a5a",borderRadius:3,background:"rgba(0,0,0,0.3)",color:"#6a6a8a",fontSize:9,cursor:"pointer",fontFamily:"'Courier New',monospace",letterSpacing:1}}>CHALLENGE (RANDOM {boss.tier.toUpperCase()})</button>
              ):null}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── ACHIEVEMENTS VIEW ────────────────────────────────────────────────────────
function AchieveView({achievements,titles,equippedTitle,onEquipTitle,C,rc,bossesDefeated}){
  const [tab,setTab]=useState("achievements");
  const unlocked=new Set(achievements);

    <div>

      </div>
      {tab==="achievements"&&(
        <div>
          <div style={C.sysMsg}>▶ Unlock achievements to gain permanent XP buffs.</div>
          <div style={{fontSize:10,color:"#4a4a6a",marginBottom:10}}>{achievements.length}/{dedupedAch.length} unlocked</div>
          {dedupedAch.map(a=>{
            const done=unlocked.has(a.id);
            return(
              <div key={a.id} style={{display:"flex",gap:10,padding:"10px 12px",marginBottom:8,background:done?"rgba(167,139,250,0.08)":"rgba(0,0,0,0.2)",border:`1px solid ${done?"#3a2a5a":"#1e1e2a"}`,borderRadius:4,opacity:done?1:0.45,transition:"all 0.2s"}}>
                <div style={{fontSize:22,width:30,textAlign:"center",flexShrink:0}}>{done?a.icon||"🏆":"🔒"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:done?"#e0d8cc":"#3a3a5a",fontWeight:done?"bold":"normal"}}>{done?a.name:"???"}</div>
                  <div style={{fontSize:9,color:done?"#5a5a7a":"#2a2a3a",marginTop:2}}>{done?a.desc:"Complete hidden objectives to unlock"}</div>
                  {done&&a.buff&&<div style={{fontSize:9,color:STATS[a.buff.stat]?.color||"#a78bfa",marginTop:4}}>⚡ +{a.buff.pct}% {STATS[a.buff.stat]?.label} XP permanently</div>}
                </div>
                {done&&<div style={{fontSize:9,color:"#4ade80",alignSelf:"center"}}>✓</div>}
              </div>
            );
          })}
        </div>
      )}
      {tab==="titles"&&(
        <div>
          <div style={C.sysMsg}>▶ Defeat bosses to earn titles (5% drop). Equip one to display it.</div>
          <div style={{fontSize:10,color:"#4a4a6a",marginBottom:10}}>{titles.length}/{ALL_TITLES.length} unlocked</div>
          {ALL_TITLES.map(t=>{
            const owned=titles.includes(t);
            const equipped=equippedTitle===t;
            const bonus=TITLE_BONUSES[t];
            return(
              <div key={t} style={{display:"flex",gap:10,padding:"10px 12px",marginBottom:8,background:equipped?"rgba(245,158,11,0.1)":owned?"rgba(167,139,250,0.06)":"rgba(0,0,0,0.2)",border:`1px solid ${equipped?"#f59e0b":owned?"#3a2a5a":"#1e1e2a"}`,borderRadius:4,opacity:owned?1:0.4,transition:"all 0.2s",alignItems:"center"}}>
                <div style={{fontSize:22,width:30,textAlign:"center",flexShrink:0}}>{owned?"👑":"🔒"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:equipped?"#f59e0b":owned?"#e0d8cc":"#3a3a5a",fontWeight:equipped||owned?"bold":"normal"}}>{owned?t:"???"}</div>
                  {owned&&bonus&&<div style={{fontSize:9,color:"#4ade80",marginTop:2}}>{bonus}</div>}
                  {!owned&&<div style={{fontSize:9,color:"#2a2a3a",marginTop:2}}>Defeat bosses to unlock titles at 5% drop rate</div>}
                  {equipped&&<div style={{fontSize:9,color:"#f59e0b",marginTop:2}}>✦ EQUIPPED</div>}
                </div>
                {owned&&<button onClick={()=>onEquipTitle(t)} style={{padding:"5px 12px",border:`1px solid ${equipped?"#f59e0b":"#3a3a5a"}`,borderRadius:3,background:equipped?"rgba(245,158,11,0.2)":"none",color:equipped?"#f59e0b":"#5a5a7a",fontSize:9,cursor:"pointer",fontFamily:"'Courier New',monospace",letterSpacing:1,flexShrink:0}}>{equipped?"UNEQUIP":"EQUIP"}</button>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── LOG VIEW ─────────────────────────────────────────────────────────────────
function LogView({log,C}){
  function dot(text){
    if(text?.startsWith("💀")||text?.startsWith("✗"))return"#ef4444";
    if(text?.startsWith("⚔")||text?.startsWith("🏆"))return"#f59e0b";
    if(text?.startsWith("✓"))return"#4ade80";
    if(text?.startsWith("📋")||text?.startsWith("⬆"))return"#a78bfa";
    if(text?.startsWith("🔄"))return"#06b6d4";
    if(text?.startsWith("✨")||text?.startsWith("👑"))return"#f59e0b";
    if(text?.startsWith("⚠"))return"#f97316";
    return"#3a3a5a";
  }
  function bg(text){
    if(text?.startsWith("💀")||text?.startsWith("✗"))return{bg:"rgba(239,68,68,0.07)",border:"#3a1a1a"};
    if(text?.startsWith("⚔")||text?.startsWith("🏆"))return{bg:"rgba(245,158,11,0.07)",border:"#4a3a00"};
    if(text?.startsWith("✓"))return{bg:"rgba(74,222,128,0.07)",border:"#1a3a1a"};
    if(text?.startsWith("📋")||text?.startsWith("⬆"))return{bg:"rgba(167,139,250,0.07)",border:"#2a1a4a"};
    if(text?.startsWith("🔄"))return{bg:"rgba(6,182,212,0.06)",border:"#0a2a2a"};
    if(text?.startsWith("⚠"))return{bg:"rgba(249,115,22,0.07)",border:"#3a1a00"};
    return{bg:"rgba(255,255,255,0.02)",border:"#1e1e35"};
  }
  return(
    <div>
      <div style={C.sysMsg}>▶ Dungeon System Log — all events recorded here.</div>
      {(!log||log.length===0)&&<div style={{color:"#3a3a5a",fontSize:12,textAlign:"center",padding:36}}>No activity yet.</div>}
      {(log||[]).map(e=>{
        const s=bg(e.text);
        return(
          <div key={e.id} style={{background:s.bg,border:`1px solid ${s.border}`,borderRadius:4,padding:"9px 11px",marginBottom:6,display:"flex",gap:10,alignItems:"flex-start"}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:dot(e.text),marginTop:4,flexShrink:0}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:11,color:"#e0d8cc",lineHeight:1.4}}>{e.text}</div>
              <div style={{fontSize:9,color:"#3a3a5a",marginTop:3}}>{e.time}</div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Auth screens ──────────────────────────────────────────────────────────────
function LoginScreen(){
  const [mode,setMode]=useState("home");
  const [inputId,setInputId]=useState("");
  const [newId,setNewId]=useState("");
  const [err,setErr]=useState("");
  const [loading,setLoading]=useState(false);
  async function handleLogin(){setErr("");setLoading(true);try{await signInWithHunterId(inputId);await restoreGameStateFromUid(_currentUid);ReactDOM.render(<App onSignOut={handleSignOut}/>,document.getElementById("root"));}catch(e){setErr(e.message);setLoading(false);}}
  async function handleRegister(){setErr("");setLoading(true);try{const id=await createNewHunter();setNewId(id);setMode("registered");setLoading(false);}catch(e){setErr(e.message);setLoading(false);}}
  async function handleContinueAfterRegister(){ReactDOM.render(<App onSignOut={handleSignOut}/>,document.getElementById("root"));}
  async function handleSignOut(){await signOut();ReactDOM.render(<LoginScreen/>,document.getElementById("root"));}
  const s={
    wrap:{minHeight:"100vh",background:"#07070f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace",padding:"0 24px"},
    inner:{textAlign:"center",maxWidth:340,width:"100%",position:"relative",zIndex:2},
    title:{fontSize:24,fontWeight:"bold",color:"#a78bfa",letterSpacing:3,marginBottom:4},
    sub:{fontSize:13,color:"#6a6a8a",letterSpacing:2,marginBottom:32},
    box:{background:"rgba(167,139,250,0.05)",border:"1px solid #2a2a4a",borderRadius:8,padding:"20px",marginBottom:20,textAlign:"left"},
    label:{fontSize:9,color:"#6a5a8a",letterSpacing:2,marginBottom:6,display:"block"},
    input:{width:"100%",padding:"12px",background:"#0e0e1f",border:"1px solid #3a3a5a",borderRadius:6,fontSize:14,color:"#a78bfa",fontFamily:"'Courier New',monospace",letterSpacing:2,boxSizing:"border-box",textTransform:"uppercase"},
    btn:{width:"100%",padding:"14px",background:"#a78bfa",border:"none",borderRadius:8,fontSize:12,cursor:"pointer",fontFamily:"'Courier New',monospace",fontWeight:"bold",color:"#07070f",letterSpacing:2,marginBottom:10},
    btnGhost:{width:"100%",padding:"12px",background:"transparent",border:"1px solid #2a2a4a",borderRadius:8,fontSize:11,cursor:"pointer",fontFamily:"'Courier New',monospace",color:"#6a6a8a",letterSpacing:2},
    err:{fontSize:10,color:"#f87171",marginTop:8,letterSpacing:1},
    idBox:{background:"#0e0e1f",border:"2px solid #a78bfa",borderRadius:8,padding:"16px",marginBottom:20,textAlign:"center"},
    idText:{fontSize:22,fontWeight:"bold",color:"#a78bfa",letterSpacing:3},
    warn:{fontSize:10,color:"#facc15",lineHeight:1.7,marginTop:10},
  };
  if(mode==="registered")return(<div style={s.wrap}><div style={s.inner}><div style={{fontSize:48,marginBottom:12}}>🎉</div><div style={s.title}>HUNTER REGISTERED</div><div style={s.sub}>YOUR HUNTER ID</div><div style={s.idBox}><div style={s.idText}>{newId}</div><div style={s.warn}>⚠ SAVE THIS ID NOW<br/>Screenshot or write it down.<br/>This is the only way to recover your account.</div></div><button style={s.btn} onClick={handleContinueAfterRegister}>ENTER THE DUNGEON →</button></div></div>);
  if(mode==="login")return(<div style={s.wrap}><div style={s.inner}><div style={{fontSize:48,marginBottom:12}}>🔑</div><div style={s.title}>RETURNING HUNTER</div><div style={s.sub}>ENTER YOUR ID</div><div style={s.box}><label style={s.label}>HUNTER ID</label><input style={s.input} value={inputId} onChange={e=>setInputId(e.target.value)} placeholder="SHADOW-4729" maxLength={20}/>{err&&<div style={s.err}>{err}</div>}</div><button style={{...s.btn,opacity:loading?0.6:1}} disabled={loading} onClick={handleLogin}>{loading?"LOADING...":"ENTER DUNGEON"}</button><button style={s.btnGhost} onClick={()=>{setMode("home");setErr("");}}>← BACK</button></div></div>);
  return(<div style={s.wrap}><div style={s.inner}><div style={{fontSize:64,marginBottom:16,filter:"drop-shadow(0 0 20px #a78bfa)"}}>⚔</div><div style={{fontSize:9,color:"#3a3a5a",letterSpacing:4,marginBottom:6}}>SYSTEM INITIALIZING</div><div style={s.title}>SOLO LEVELING</div><div style={s.sub}>TRACKER</div><div style={{...s.box,textAlign:"center"}}><div style={{fontSize:10,color:"#6a5a8a",lineHeight:1.8}}>Your Hunter ID permanently links your progress across devices.</div></div><button style={s.btn} onClick={handleRegister} disabled={loading}>{loading?"CREATING...":"CREATE NEW HUNTER"}</button><button style={s.btnGhost} onClick={()=>setMode("login")}>I HAVE A HUNTER ID</button><div style={{fontSize:9,color:"#2a2a3a",marginTop:16,letterSpacing:1}}>NO ACCOUNT · NO PASSWORD · FULLY FREE</div></div></div>);
}

function LoadingScreen({message}){return(<div style={{minHeight:"100vh",background:"#07070f",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",fontFamily:"'Courier New',monospace"}}><div style={{fontSize:36,marginBottom:16}}>⚔</div><div style={{fontSize:9,color:"#a78bfa",letterSpacing:3}}>{message||"LOADING..."}</div></div>);}

// Boot
(async()=>{
  const savedId=localStorage.getItem("sl_user_id");
  if(savedId){
    _currentUid=savedId;
    const hasLocal=!!localStorage.getItem("sl_v8");
    if(!hasLocal){ReactDOM.render(<LoadingScreen message="RESTORING YOUR DATA..."/>,document.getElementById("root"));await restoreGameStateFromUid(savedId);}
    ReactDOM.render(<App onSignOut={async()=>{await signOut();ReactDOM.render(<LoginScreen/>,document.getElementById("root"));}}/>,document.getElementById("root"));
  }else{ReactDOM.render(<LoginScreen/>,document.getElementById("root"));}
})();
</script>
</body>
