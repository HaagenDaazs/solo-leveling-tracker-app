  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#07070f}
    body{padding-top:env(safe-area-inset-top)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:#0a0a18}
    ::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px}
    input,button,select,textarea{-webkit-tap-highlight-color:transparent}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.45}}
    @keyframes bossShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
    @keyframes bossFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes bossHurt{0%,100%{filter:brightness(1)}50%{filter:brightness(3) saturate(0)}}
    @keyframes glowPulse{0%,100%{opacity:0.7}50%{opacity:1}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
    @keyframes achievePop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
    .qcard{animation:fadeIn 0.28s ease forwards;opacity:0}
    .qcard:active{transform:scale(0.98)!important}
    .timer-urgent{animation:timerPulse 1s infinite}
    .boss-float{animation:bossFloat 3s ease-in-out infinite}
    .boss-hurt{animation:bossHurt 0.4s ease}
    .boss-banner{animation:slideDown 0.4s ease forwards}
    .achieve-pop{animation:achievePop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
    .glow-pulse{animation:glowPulse 2s ease-in-out infinite}
  </style>
</head>

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getRank(xp){for(let i=RANK_THRESHOLDS.length-1;i>=0;i--){if(xp>=RANK_THRESHOLDS[i])return RANKS[i];}return"E";}
function getXPInfo(xp){const rank=getRank(xp),idx=RANKS.indexOf(rank);if(idx>=RANKS.length-1)return{pct:100,nextRank:"MAX"};const cur=RANK_THRESHOLDS[idx],nxt=RANK_THRESHOLDS[idx+1];return{pct:Math.round(((xp-cur)/(nxt-cur))*100),nextRank:RANKS[idx+1]};}
function getStatRankIdx(xp){for(let i=STAT_RANK_XP.length-1;i>=0;i--){if((xp||0)>=STAT_RANK_XP[i])return i;}return 0;}
function getStatRank(xp){return RANKS[getStatRankIdx(xp)];}
function getStatPct(xp){const idx=getStatRankIdx(xp);if(idx>=RANKS.length-1)return 100;return Math.round(((xp||0)-STAT_RANK_XP[idx])/(STAT_RANK_XP[idx+1]-STAT_RANK_XP[idx])*100);}
function getStatNextRank(xp){const idx=getStatRankIdx(xp);return idx>=RANKS.length-1?"MAX":RANKS[idx+1];}
function hexToRgb(hex){try{return`${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)}`;}catch{return"100,100,200";}}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getMidnightMs(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),n.getDate()+1,0,0,0,0).getTime()-n.getTime();}
// Compute active XP buff multiplier for a stat from unlocked achievements
function getBuffMult(achievements, stat){
  let total=0;
  achievements.forEach(id=>{
    const a=ACHIEVEMENT_CATALOG.find(a=>a.id===id);
    if(a&&a.buff&&a.buff.stat===stat) total+=a.buff.pct;
    // Also check boss achievement drops
    BOSSES.forEach(b=>{ if(b.achievementDrop&&b.achievementDrop.id===id&&b.achievementDrop.buff&&b.achievementDrop.buff.stat===stat) total+=b.achievementDrop.buff.pct; });
  });
  return 1+(total/100);
}

function pickCards(n=3){
  const by={};CARDS.forEach(c=>{if(!by[c.tier])by[c.tier]=[];by[c.tier].push(c);});
  Object.keys(by).forEach(t=>by[t].sort(()=>Math.random()-0.5));
  const tiers=["mythic","legendary","epic","rare","uncommon","common"];
  const result=[];
  for(const t of tiers){if(result.length>=n)break;if(by[t]?.length)result.push(by[t].pop());}
  while(result.length<n){const all=CARDS.filter(c=>!result.find(r=>r.id===c.id)).sort(()=>Math.random()-0.5);if(!all.length)break;result.push(all[0]);}
  return result.slice(0,n);
}

function getRecommendedStart(stat,target,unit){
  const t=parseFloat(target)||0;if(!t)return null;
  const u=(unit||"").toLowerCase();
  if(stat!=="strength")return null;
  if(u.includes("kg")||u.includes("lb")){const rec=Math.max(1,Math.round(t*0.6));return{value:rec,reason:"Starting at ~60% of your goal helps ensure a safe working baseline for weighted lifts."};}
  const rec=Math.max(1,Math.round(t*0.3));
  return{value:rec,reason:"Starting at ~30% of your goal helps ensure safe progression for bodyweight reps."};
}

function getDailyValue(sg,dayIndex,totalDays,penaltyFactor=1.0){
  const mode=STATS[sg.stat]?.mode||"incremental";
  if(mode==="flat")return sg.target;
  const start=sg.startValue??sg.currentLevel??0;
  const target=sg.target;
  const range=target-start;
  if(range<=0)return target;
  const t=dayIndex/Math.max(totalDays-1,1);
  const eased=Math.pow(t,0.6);
  let val=start+range*eased;
  val=Math.round(val*10)/10;
  if(penaltyFactor>1)val=Math.min(target,Math.round(val*penaltyFactor*10)/10);
  return Math.max(start,Math.min(target,val));
}

function calcTaskXP(task,achievements=[]){
  const base=25+task.value*1.5+(task.dayIndex||0)*2;
  const buffMult=getBuffMult(achievements,task.stat);
  return Math.round(base*(task.xpMult||1)*buffMult);
}

function playBeep(f,d,t){try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t||"square";o.frequency.value=f||440;g.gain.setValueAtTime(0.18,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+(d||0.15));o.start();o.stop(c.currentTime+(d||0.15));}catch(_){}}

function genTasks(quest,dayIndex,penaltyStats=[]){
  return quest.subGoals.map(sg=>{
    const totalDays=sg.durationWeeks*7;
    const isFailed=penaltyStats.includes(sg.stat);
    const val=getDailyValue(sg,dayIndex,totalDays,isFailed?1.3:1.0);
    return{id:`${quest.id}_${sg.stat}_${dayIndex}_${Math.random().toString(36).slice(2)}`,questId:quest.id,questTitle:quest.cardTitle,stat:sg.stat,dayIndex,title:sg.title,detail:sg.detail||"",value:val,unit:sg.unit,accent:quest.accent,xpMult:quest.xpMult,isPenalty:isFailed,completed:false,failed:false,xpReward:0};
  });
}

// Check and return newly unlocked achievement IDs
function checkAchievements(prev,newState){
  const already=new Set(newState.achievements||[]);
  const newUnlocks=[];
  const totalTasksDone=(newState.log||[]).filter(l=>l.text.startsWith("✓")).length;
  ACHIEVEMENT_CATALOG.forEach(a=>{
    if(already.has(a.id))return;
    let unlock=false;
    if(a.type==="rank"&&getRank(newState.hunter.xp)===a.trigger)unlock=true;
    if(a.type==="stat_rank"){const[st,r]=a.trigger.split(":");if(getStatRank(newState.statXP[st])===r)unlock=true;}
    if(a.type==="streak"&&newState.hunter.streak>=a.trigger)unlock=true;
    if(a.type==="tasks"&&totalTasksDone>=a.trigger)unlock=true;
    if(unlock)newUnlocks.push(a.id);
  });
  return newUnlocks;
}

  statXP:{strength:0,endurance:0,intelligence:0,discipline:0,mental:0,charisma:0,creativity:0,recovery:0},
  quests:[],dailyTasks:[],notifications:[],log:[],lastResetDate:"",
  achievements:[],    // array of achievement IDs
  titles:[],          // array of unlocked title strings
  equippedTitle:null, // currently equipped title string
  activeBoss:null,    // { bossId, startTime, tasksDone:[], failed, won }
  nextBossSpawnTime:0, // timestamp when next boss should auto-spawn
};

// Random boss spawn: tier weighted by probability
// Common 40%, Uncommon 25%, Rare 18%, Epic 10%, Legendary 5%, Mythic 2%
const BOSS_TIER_WEIGHTS=[
  {tier:"common",weight:40},{tier:"uncommon",weight:25},{tier:"rare",weight:18},
  {tier:"epic",weight:10},{tier:"legendary",weight:5},{tier:"mythic",weight:2}
];
function pickRandomBossTier(){
  const roll=Math.random()*100;let acc=0;
  for(const t of BOSS_TIER_WEIGHTS){acc+=t.weight;if(roll<acc)return t.tier;}
  return "common";
}
function scheduleNextBossMs(){
  // Random between 20 minutes and 3 hours (1200000 - 10800000 ms)
  return Date.now()+(1200000+Math.floor(Math.random()*9600000));
}
// Compute HP damage per task: 100 HP / number of tasks, floored, last task takes remainder
function getBossDamage(boss,taskIndex){
  const n=boss.tasks.length;
  const base=Math.floor(100/n);
  return taskIndex===n-1?100-(base*(n-1)):base;
}

  useEffect(()=>{const asked=localStorage.getItem("sl_notif_asked");if(!asked&&typeof Notification!=="undefined"&&Notification.permission==="default"){const t=setTimeout(()=>setShowNotifPrompt(true),1400);return()=>clearTimeout(t);}},[]);
  useEffect(()=>{
    if(notifRef.current)clearInterval(notifRef.current);
    notifRef.current=setInterval(()=>{
      setS(prev=>{const done=prev.dailyTasks.filter(t=>t.completed).length,tot=prev.dailyTasks.length;const body=`${prev.hunter.name} — ${done}/${tot} tasks done. The dungeon awaits.`;sendNotif("Daily Quest Update",body);return{...prev,notifications:[{id:Date.now(),msg:"[REMINDER] "+body,type:"system",time:new Date().toLocaleTimeString()},...prev.notifications].slice(0,30)};});

    },notifInt*60*1000);
    return()=>clearInterval(notifRef.current);
  },[notifInt]);

  // Boss timer checker
  useEffect(()=>{
    if(bossTimerRef.current)clearInterval(bossTimerRef.current);
    bossTimerRef.current=setInterval(()=>{
      setS(prev=>{
        if(!prev.activeBoss||prev.activeBoss.failed||prev.activeBoss.won)return prev;
        const boss=BOSSES.find(b=>b.id===prev.activeBoss.bossId);
        if(!boss)return prev;
        const elapsed=Date.now()-prev.activeBoss.startTime;
        if(elapsed>=boss.timeLimitMs){
          sendNotif("⚠ Boss Escaped!",`${boss.name} has fled the dungeon. You ran out of time.`);
          return{...prev,activeBoss:{...prev.activeBoss,failed:true},notifications:[{id:Date.now(),msg:`⚠ BOSS ESCAPED: ${boss.name} fled. Time ran out.`,type:"penalty",time:new Date().toLocaleTimeString()},...prev.notifications].slice(0,30)};
        }
        return prev;
      });
    },5000);
    return()=>clearInterval(bossTimerRef.current);
  },[]);

  // Random boss auto-spawn checker
  useEffect(()=>{
    const iv=setInterval(()=>{
      setS(prev=>{
        // Don't spawn if a boss is already active (not failed/won)
        if(prev.activeBoss&&!prev.activeBoss.failed&&!prev.activeBoss.won)return prev;
        if(Date.now()<(prev.nextBossSpawnTime||0))return prev;
        // Time to spawn! Pick random tier & boss
        const tier=pickRandomBossTier();
        const possible=BOSSES.filter(b=>b.tier===tier);
        const boss=possible[Math.floor(Math.random()*possible.length)];
        const next=scheduleNextBossMs();
        sendNotif("⚔ Boss Appeared!",`${boss.name} — ${boss.subtitle}. Defeat it before time runs out!`);

        };
      });
    },15000); // check every 15 seconds
    return()=>clearInterval(iv);
  },[]);

  function checkReset(){
    const today=todayStr();
    setS(prev=>{if(prev.lastResetDate===today)return prev;return doReset(prev,today);});
  }

  function doReset(prev,today){
    const failed={};
    prev.dailyTasks.forEach(t=>{if(!t.completed){if(!failed[t.questId])failed[t.questId]=[];failed[t.questId].push(t.stat);}});
    const totalMissed=Object.values(failed).reduce((a,b)=>a+b.length,0);
    let quests=prev.quests.map(q=>{
      if(!q.active)return q;
      const newSG=q.subGoals.map(sg=>({...sg,dayIndex:(sg.dayIndex||0)+1,done:(sg.dayIndex||0)+1>=sg.durationWeeks*7}));
      return{...q,subGoals:newSG,active:!newSG.every(sg=>sg.done),completed:newSG.every(sg=>sg.done)};
    });
    const newTasks=[];
    quests.forEach(q=>{if(!q.active)return;const pen=failed[q.id]||[];newTasks.push(...genTasks(q,q.subGoals[0]?.dayIndex||0,pen));});
    const log=[...(totalMissed>0?[{id:Date.now(),text:`Day reset: ${totalMissed} task(s) missed — penalty applied.`,time:new Date().toLocaleString()}]:[]),...prev.log].slice(0,80);
    const hunter={...prev.hunter,daysMissed:prev.hunter.daysMissed+(totalMissed>0?1:0),streak:totalMissed>0?0:prev.hunter.streak};
    return{...prev,quests,dailyTasks:newTasks,hunter,log,lastResetDate:today};
  }

  const rank=getRank(S.hunter.xp);
  const rc=RANK_COLORS[rank];
  const xi=getXPInfo(S.hunter.xp);
  const equippedTitle=S.equippedTitle;

  function showMsg(msg,type){setToast({msg,type:type||"info"});setTimeout(()=>setToast(null),2800);}
  function pushNotif(msg,type){setS(prev=>({...prev,notifications:[{id:Date.now(),msg,type:type||"system",time:new Date().toLocaleTimeString()},...prev.notifications].slice(0,30)}));}

  function triggerAchievePopup(ids){
    if(!ids||!ids.length)return;
    const first=ids[0];
    let a=ACHIEVEMENT_CATALOG.find(a=>a.id===first);
    if(!a){BOSSES.forEach(b=>{if(b.achievementDrop?.id===first)a=b.achievementDrop;});}
    if(a){
      setAchievePopup(a);
      setTimeout(()=>setAchievePopup(null),4000);
      playSfx("levelup");
      sendNotif("Achievement Unlocked! 🏆",`${a.name} — ${a.desc}`);
    }
  }

  function completeTask(id){
    setS(prev=>{
      const t=prev.dailyTasks.find(dt=>dt.id===id);if(!t)return prev;
      const buffXP=calcTaskXP(t,prev.achievements||[]);
      const dailyTasks=prev.dailyTasks.map(dt=>dt.id===id?{...dt,completed:true,xpReward:buffXP}:dt);
      const statXP={...prev.statXP};if(statXP[t.stat]!==undefined)statXP[t.stat]+=buffXP;
      const oldRank=getRank(prev.hunter.xp);
      const hunter={...prev.hunter,xp:prev.hunter.xp+buffXP,totalXP:prev.hunter.totalXP+buffXP,tasksCompleted:(prev.hunter.tasksCompleted||0)+1};
      const newRank=getRank(hunter.xp);
      const doneAll=dailyTasks.filter(dt=>dt.questId===t.questId).every(dt=>dt.completed||dt.failed);
      const newStreak=doneAll?prev.hunter.streak+1:prev.hunter.streak;
      const log=[{id:Date.now(),text:`✓ ${t.title}: ${t.value} ${t.unit} (+${buffXP} XP)`,time:new Date().toLocaleString()},...prev.log].slice(0,80);
      const ns={...prev,dailyTasks,statXP,hunter:{...hunter,streak:newStreak},log};
      const newAch=checkAchievements(prev,ns);
      if(newRank!==oldRank){sendNotif("⬆ RANK UP!",`You have ascended to Rank ${newRank}!`);setTimeout(()=>{playSfx("levelup");showMsg(`⬆ RANK UP! You are now Rank ${newRank}`,"success");},100);}
      if(newAch.length){setTimeout(()=>triggerAchievePopup(newAch),500);}
      sendNotif("Quest Complete! ⚔",`+${buffXP} XP — ${t.title}`);
      return{...ns,achievements:[...(ns.achievements||[]),...newAch]};
    });
    playSfx("success");showMsg("Task complete! XP gained.","success");
  }

  function failTask(id){
    setS(prev=>{
      const t=prev.dailyTasks.find(dt=>dt.id===id);if(!t)return prev;
      const dailyTasks=prev.dailyTasks.map(dt=>dt.id===id?{...dt,failed:true}:dt);
      const log=[{id:Date.now(),text:`✗ FAILED: ${t.title} — tomorrow +30%`,time:new Date().toLocaleString()},...prev.log].slice(0,80);
      return{...prev,dailyTasks,hunter:{...prev.hunter,streak:0,daysMissed:prev.hunter.daysMissed+1},log,notifications:[{id:Date.now(),msg:`Task failed: ${t.title}. Tomorrow +30%.`,type:"penalty",time:new Date().toLocaleTimeString()},...prev.notifications].slice(0,30)};
    });
    playSfx("fail");showMsg("Task failed — tomorrow's target increases.","danger");
  }

  // Boss functions
  function spawnBoss(tier){
    const possible=BOSSES.filter(b=>b.tier===tier);
    const boss=possible[Math.floor(Math.random()*possible.length)];
    setS(prev=>({
      ...prev,
      activeBoss:{bossId:boss.id,startTime:Date.now(),tasksDone:[],failed:false,won:false},
      nextBossSpawnTime:scheduleNextBossMs(),
      notifications:[{id:Date.now(),msg:`⚔ BOSS APPEARED: ${boss.name} — ${boss.subtitle}`,type:"boss",time:new Date().toLocaleTimeString()},...prev.notifications].slice(0,30),
    }));
    playSfx("boss");
    sendNotif("⚔ Boss Appeared!",`${boss.name} has appeared. Defeat it before time runs out!`);
    setShowBoss(true);
  }

  function completeBossTask(taskId){
    setS(prev=>{
      if(!prev.activeBoss||prev.activeBoss.failed||prev.activeBoss.won)return prev;
      const boss=BOSSES.find(b=>b.id===prev.activeBoss.bossId);if(!boss)return prev;
      const tasksDone=[...prev.activeBoss.tasksDone,taskId];
      const allDone=boss.tasks.every(t=>tasksDone.includes(t.id));
      // XP for this task
      const bossTask=boss.tasks.find(t=>t.id===taskId);
      const xp=bossTask?Math.round(bossTask.xp*(prev.achievements?getBuffMult(prev.achievements,bossTask.stat):1)):0;
      const statXP={...prev.statXP};
      if(bossTask&&statXP[bossTask.stat]!==undefined)statXP[bossTask.stat]+=xp;
      const oldRank=getRank(prev.hunter.xp);
      const hunter={...prev.hunter,xp:prev.hunter.xp+xp,totalXP:prev.hunter.totalXP+xp};
      const newRank=getRank(hunter.xp);
      let activeBoss={...prev.activeBoss,tasksDone};
      let newTitles=[...(prev.titles||[])];
      let newAch=[...(prev.achievements||[])];
      let popupTarget=null;
      if(allDone){
        activeBoss={...activeBoss,won:true};
        // Boss defeat XP
        const bonusXP=boss.xpReward;
        hunter.xp+=bonusXP;hunter.totalXP+=bonusXP;
        // 5% title drop
        const titleRoll=Math.random();
        let newTitle=null;
        if(titleRoll<0.05&&boss.titleDrop&&!newTitles.includes(boss.titleDrop)){newTitles.push(boss.titleDrop);newTitle=boss.titleDrop;setTimeout(()=>{playSfx("title");showMsg(`Title unlocked: "${newTitle}"!`,"success");},600);}
        // 5% achievement drop
        const achRoll=Math.random();
        if(achRoll<0.05&&boss.achievementDrop&&!newAch.includes(boss.achievementDrop.id)){newAch.push(boss.achievementDrop.id);popupTarget=boss.achievementDrop.id;setTimeout(()=>triggerAchievePopup([boss.achievementDrop.id]),900);}
        sendNotif("⚔ Boss Defeated!",`${boss.name} has been slain! +${bonusXP} XP`);
        setTimeout(()=>{playSfx("epic");showMsg(`Boss defeated! +${bonusXP} XP`,"success");},300);
      }
      if(newRank!==oldRank){setTimeout(()=>{playSfx("levelup");showMsg(`⬆ RANK UP! Now Rank ${newRank}`,"success");},400);}
      const log=[{id:Date.now(),text:`⚔ Boss task: ${bossTask?.desc||taskId} (+${xp} XP)${allDone?" — BOSS DEFEATED!":""}`,time:new Date().toLocaleString()},...prev.log].slice(0,80);
      const nsBase={...prev,activeBoss,statXP,hunter,log,titles:newTitles,achievements:newAch};
      const extraAch=checkAchievements(prev,nsBase);
      if(extraAch.length){setTimeout(()=>triggerAchievePopup(extraAch),1000);}
      return{...nsBase,achievements:[...newAch,...extraAch]};
    });
    playSfx("success");
  }

  function openQuestPicker(){playSfx("click");setCards(pickCards(3));setSelCard(null);setSubForms([]);setModal("pick");}
  function selectCard(card){playSfx("click");setSelCard(card);setSubForms(card.stats.map(s=>({stat:s,title:"",detail:"",target:"",unit:"",startValue:"",durationWeeks:String(STATS[s].defaultWeeks)})));}
  function updateSub(idx,field,val){setSubForms(prev=>prev.map((f,i)=>i===idx?{...f,[field]:val}:f));}

  function submitQuest(){
    if(!selCard)return;
    for(const sg of subForms){if(!sg.title.trim()){showMsg(`Enter a name for ${STATS[sg.stat].label} task`,"danger");return;}if(!parseFloat(sg.target)||parseFloat(sg.target)<=0){showMsg(`Enter a target for ${sg.title||sg.stat}`,"danger");return;}}
    const quest={id:Date.now(),cardId:selCard.id,cardTitle:selCard.title,cardIcon:selCard.icon,tier:selCard.tier,accent:selCard.accent,stats:selCard.stats,xpMult:TIERS[selCard.tier].xpMult,active:true,completed:false,subGoals:subForms.map(sg=>{const target=parseFloat(sg.target),sv=parseFloat(sg.startValue);return{stat:sg.stat,title:sg.title.trim(),detail:sg.detail.trim(),target,unit:sg.unit.trim()||"reps",startValue:(!isNaN(sv)&&sv>=0)?sv:(STATS[sg.stat]?.mode==="flat"?target:Math.round(target*0.3)||1),currentLevel:0,durationWeeks:parseInt(sg.durationWeeks)||STATS[sg.stat].defaultWeeks||4,dayIndex:0,done:false};})};
    const tasks=genTasks(quest,0,[]);
    setS(prev=>({...prev,quests:[...prev.quests,quest],dailyTasks:[...prev.dailyTasks.filter(t=>t.questId!==quest.id),...tasks],lastResetDate:prev.lastResetDate||todayStr(),log:[{id:Date.now(),text:`Quest accepted: [${quest.cardTitle}] — ${quest.subGoals.map(s=>s.title).join(", ")}`,time:new Date().toLocaleString()},...prev.log].slice(0,80)}));
    pushNotif(`New quest registered: ${quest.cardTitle}.`,"quest");
    setModal(null);playSfx("epic");showMsg(`Quest registered! ${tasks.length} daily task(s) active.`,"success");
  }

  function doRename(){const n=(newName||"").trim();if(!n)return;setS(prev=>({...prev,hunter:{...prev.hunter,name:n}}));setModal(null);showMsg("Name updated","success");}
  function doFullReset(){try{localStorage.removeItem("sl_v7")}catch(_){}setS({...INIT});setModal(null);setConfirmReset(false);showMsg("Data reset.","info");}
  function equipTitle(t){setS(prev=>({...prev,equippedTitle:prev.equippedTitle===t?null:t}));playSfx("click");}

  const activeTasks=S.dailyTasks.filter(t=>!t.completed&&!t.failed);
  const completedTasks=S.dailyTasks.filter(t=>t.completed);
  const activeBossData=S.activeBoss&&!S.activeBoss.failed&&!S.activeBoss.won?BOSSES.find(b=>b.id===S.activeBoss.bossId):null;
  const hrs=Math.floor(timeLeft/3600000),mins=Math.floor((timeLeft%3600000)/60000),secs=Math.floor((timeLeft%60000)/1000);
  const timerStr=`${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
  const urgent=hrs<1;

  const C={

    header:{background:"#0a0a18",borderBottom:"1px solid #1e1e35",padding:"12px 14px"},
    nav:{display:"flex",borderBottom:"1px solid #1e1e35",background:"#080815"},
    navBtn:(v)=>({flex:1,padding:"9px 0",background:"none",border:"none",color:view===v?rc:"#3a3a5a",fontSize:"7.5px",letterSpacing:1,textTransform:"uppercase",cursor:"pointer",borderBottom:view===v?"2px solid "+rc:"2px solid transparent",transition:"color 0.2s"}),
    content:{padding:"14px 14px 100px"},
    sysMsg:{fontSize:11,color:"#6a5a8a",letterSpacing:1,marginBottom:14,padding:"7px 10px",borderLeft:"2px solid #3a2a5a",background:"rgba(167,139,250,0.04)"},
    sh:(c)=>({fontSize:9,color:c,letterSpacing:3,marginBottom:8}),
    overlay:{position:"fixed",inset:0,background:"rgba(0,0,0,0.94)",zIndex:100,display:"flex",alignItems:"flex-start",justifyContent:"center",padding:"14px",overflowY:"auto"},
    box:{background:"#0c0c1c",border:"1px solid #3a2a6a",borderRadius:6,padding:18,width:"100%",maxWidth:400,marginTop:14,marginBottom:14},
    inp:{width:"100%",background:"#0d0d1c",border:"1px solid #2a2a4a",color:"#e0d8cc",padding:"8px 10px",borderRadius:3,fontSize:12,marginBottom:8,boxSizing:"border-box",fontFamily:"'Courier New',monospace",outline:"none"},
    lbl:{fontSize:9,color:"#7a6a9a",letterSpacing:2,display:"block",marginBottom:3,textTransform:"uppercase"},
  };

  return(
    <div style={C.app}>
      <div style={{position:"fixed",inset:0,backgroundImage:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px)",pointerEvents:"none",zIndex:1}}/>

      {/* Header */}
      <div style={C.header}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,color:"#3a3a5a",letterSpacing:3}}>SYSTEM</div>
            <div style={{fontSize:13,fontWeight:"bold",color:rc,letterSpacing:1}}>
              [{rank}] {S.hunter.name}{equippedTitle?<span style={{color:"#f59e0b",fontSize:10}}> ({equippedTitle})</span>:null}
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:9,color:"#3a3a5a"}}>TOTAL XP</div>
            <div style={{fontSize:17,fontWeight:"bold",color:"#a78bfa"}}>{S.hunter.xp.toLocaleString()}</div>
          </div>
        </div>
        <div style={{marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#3a3a5a",marginBottom:3}}>
            <span>Rank {rank}</span><span>{xi.pct}% → {xi.nextRank}</span>
          </div>
          <div style={{height:3,background:"#1a1a2e",borderRadius:2}}>
            <div style={{height:"100%",width:xi.pct+"%",background:rc,borderRadius:2,transition:"width 0.6s",boxShadow:"0 0 5px "+rc}}/>
          </div>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:7}}>
          <div style={{display:"flex",gap:10,fontSize:10}}>
            <span style={{color:"#4ade80"}}>🔥 {S.hunter.streak}</span>
            <span style={{color:"#f59e0b"}}>✓ {completedTasks.length}/{S.dailyTasks.length}</span>
            <span style={{color:"#a78bfa"}}>🏆 {(S.achievements||[]).length}</span>
          </div>
          <div className={urgent?"timer-urgent":""} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(0,0,0,0.4)",border:"1px solid "+(urgent?"#ef4444":"#1e1e35"),borderRadius:3,padding:"3px 8px"}}>
            <span style={{fontSize:9,color:urgent?"#ef4444":"#3a3a5a"}}>RESET</span>
            <span style={{fontSize:11,color:urgent?"#ef4444":"#6a6a8a",fontVariantNumeric:"tabular-nums"}}>{timerStr}</span>
          </div>
        </div>
      </div>

      {/* Nav */}
      <div style={C.nav}>
        {["dashboard","stats","quests","achieve","notifs"].map(v=>
          <button key={v} style={C.navBtn(v)} onClick={()=>{playSfx("click");setView(v);}}>
            {v==="achieve"?"ACHIEVE":v==="dashboard"?"HOME":v.toUpperCase()}
          </button>
        )}
      </div>

      {/* Active boss banner */}
      {activeBossData&&(
        <div className="boss-banner" style={{background:`linear-gradient(90deg,${activeBossData.bgColor},#0a0a18)`,borderBottom:`1px solid ${activeBossData.color}`,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>{playSfx("click");setShowBoss(true);}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div className="glow-pulse" style={{width:8,height:8,borderRadius:"50%",background:activeBossData.color,boxShadow:`0 0 6px ${activeBossData.color}`}}/>
            <div>
              <div style={{fontSize:9,color:activeBossData.color,letterSpacing:2}}>⚔ BOSS ACTIVE</div>
              <div style={{fontSize:11,color:"#e0d8cc",fontWeight:"bold"}}>{activeBossData.name}</div>
            </div>
          </div>
          <div style={{textAlign:"right"}}>
            <BossTimer boss={activeBossData} startTime={S.activeBoss.startTime} tasksDone={S.activeBoss.tasksDone}/>
            <div style={{fontSize:8,color:"#4a4a6a",marginTop:2}}>TAP TO VIEW →</div>
          </div>
        </div>
      )}

      <div style={C.content}>
        {view==="dashboard"&&<Dashboard activeTasks={activeTasks} completedTasks={completedTasks} allTasks={S.dailyTasks} onComplete={completeTask} onFail={failTask} rc={rc} C={C} onSpawnBoss={spawnBoss} activeBoss={S.activeBoss} nextBossSpawnTime={S.nextBossSpawnTime}/>}
        {view==="stats"&&<StatsView statXP={S.statXP} hunter={S.hunter} achievements={S.achievements||[]} rc={rc} C={C}/>}
        {view==="quests"&&<QuestsView quests={S.quests} dailyTasks={S.dailyTasks} rc={rc} C={C}/>}
        {view==="achieve"&&<AchieveView achievements={S.achievements||[]} titles={S.titles||[]} equippedTitle={S.equippedTitle} onEquipTitle={equipTitle} log={S.log} C={C} rc={rc}/>}
        {view==="notifs"&&<NotifsView notifications={S.notifications} C={C} notifInt={notifInt} setNotifInt={setNotifInt} notifPerm={notifPerm} setNotifPerm={setNotifPerm}/>}
      </div>

      <button style={{position:"fixed",bottom:20,right:16,width:54,height:54,borderRadius:"50%",background:"#a78bfa",border:"none",color:"#07070f",fontSize:26,cursor:"pointer",zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold",boxShadow:"0 0 20px rgba(167,139,250,0.5)"}} onClick={openQuestPicker}>+</button>
      <button style={{position:"fixed",bottom:24,left:14,background:"none",border:"1px solid #252540",color:"#3a3a5a",padding:"7px 10px",borderRadius:3,fontSize:9,cursor:"pointer",zIndex:50,letterSpacing:1}} onClick={()=>{playSfx("click");setNewName(S.hunter.name);setModal("settings");}}>⚙</button>

      {toast&&<div style={{position:"fixed",bottom:86,left:"50%",transform:"translateX(-50%)",background:toast.type==="success"?"#0f2a0f":toast.type==="danger"?"#2a0f0f":"#0f0f2a",border:"1px solid "+(toast.type==="success"?"#4ade80":toast.type==="danger"?"#ef4444":"#a78bfa"),padding:"8px 18px",borderRadius:4,fontSize:12,color:"#e0d8cc",zIndex:200,whiteSpace:"nowrap",pointerEvents:"none"}}>{toast.msg}</div>}

      {/* Achievement popup */}
      {achievePopup&&(
        <div className="achieve-pop" style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",background:"#1a0a2a",border:"2px solid #a78bfa",borderRadius:8,padding:"14px 20px",zIndex:300,textAlign:"center",minWidth:240,boxShadow:"0 0 30px rgba(167,139,250,0.5)"}}>
          <div style={{fontSize:28,marginBottom:4}}>{achievePopup.icon||"🏆"}</div>
          <div style={{fontSize:9,color:"#a78bfa",letterSpacing:3,marginBottom:3}}>ACHIEVEMENT UNLOCKED</div>
          <div style={{fontSize:13,fontWeight:"bold",color:"#e0d8cc"}}>{achievePopup.name}</div>
          <div style={{fontSize:10,color:"#6a6a8a",marginTop:3}}>{achievePopup.desc}</div>
          {achievePopup.buff&&<div style={{fontSize:10,color:STATS[achievePopup.buff.stat]?.color||"#a78bfa",marginTop:6}}>+{achievePopup.buff.pct}% {STATS[achievePopup.buff.stat]?.label} XP permanently</div>}
        </div>
      )}

      {/* Boss Modal */}
      {showBoss&&S.activeBoss&&(()=>{
        const boss=BOSSES.find(b=>b.id===S.activeBoss.bossId);
        if(!boss)return null;

                <div>
                  <div style={{fontSize:8,color:TIERS[boss.tier].color,letterSpacing:3}}>{TIERS[boss.tier].label} BOSS</div>
                  <div style={{fontSize:14,fontWeight:"bold",color:boss.color}}>{boss.name}</div>
                  <div style={{fontSize:10,color:"#5a5a7a",marginTop:1}}>{boss.subtitle}</div>
                </div>
                <button style={{background:"none",border:"none",color:"#6a6a8a",fontSize:18,cursor:"pointer"}} onClick={()=>{playSfx("click");setShowBoss(false);}}>✕</button>
              </div>

              {/* Sprite */}
              <div style={{textAlign:"center",marginBottom:12}}>
                <div className={won||failed?"":tasksDone.length>0?"boss-hurt":"boss-float"} style={{display:"inline-block",filter:won?"grayscale(1) brightness(0.3)":failed?"sepia(1) hue-rotate(300deg)":"none"}}>
                  <BossSprite type={boss.sprite} color={boss.color} size={100}/>

                {(won||failed)&&<div style={{fontSize:12,color:won?"#4ade80":"#ef4444",marginTop:6,letterSpacing:2}}>{won?"⚔ DEFEATED":"✗ ESCAPED"}</div>}

              {/* HP bar (tasks = HP) */}
              {!won&&!failed&&(
                <>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#3a3a5a",marginBottom:3}}>
                    <span>HP</span><span>{hpRemaining}/{totalHP}</span>
                  </div>
                  <div style={{height:6,background:"#1a0a0a",borderRadius:3,marginBottom:10,border:"1px solid #3a1a1a"}}>
                    <div style={{height:"100%",width:(100-pct)+"%",background:hpRemaining>60?"#ef4444":hpRemaining>30?"#f59e0b":"#4ade80",borderRadius:3,transition:"width 0.4s",boxShadow:`0 0 6px ${hpRemaining>60?"#ef4444":hpRemaining>30?"#f59e0b":"#4ade80"}`}}/>
                  </div>
                  <BossTimer boss={boss} startTime={S.activeBoss.startTime} tasksDone={tasksDone} large/>
                </>
              )}

              {/* Rewards preview */}
              <div style={{display:"flex",gap:8,marginBottom:12,marginTop:4}}>
                <div style={{flex:1,background:"rgba(0,0,0,0.3)",border:"1px solid #2a2a4a",borderRadius:3,padding:"7px 9px",textAlign:"center"}}>
                  <div style={{fontSize:9,color:"#3a3a5a"}}>XP REWARD</div>
                  <div style={{fontSize:12,color:"#a78bfa",fontWeight:"bold"}}>{boss.xpReward.toLocaleString()}</div>
                </div>
                <div style={{flex:1,background:"rgba(0,0,0,0.3)",border:"1px solid #2a2a4a",borderRadius:3,padding:"7px 9px",textAlign:"center"}}>

                  <div style={{fontSize:10,color:"#a78bfa"}}>5% chance</div>

              <div style={{fontSize:9,color:boss.color,letterSpacing:2,marginBottom:8}}>DUNGEON TASKS</div>
              {boss.tasks.map((t,tIdx)=>{
                const done=tasksDone.includes(t.id);
                const dmg=getBossDamage(boss,tIdx);
                return(

            </div>
          </div>
        );
      })()}

      {/* Card picker */}
      {modal==="pick"&&(
        <div style={C.overlay}>
          <div style={C.box}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>

          <div style={{background:"#0e0e20",border:"1px solid #3a2a6a",borderRadius:14,padding:"26px 22px",width:"100%",maxWidth:380,margin:"0 14px"}}>
            <div style={{textAlign:"center",marginBottom:14}}>
              <div style={{fontSize:36,marginBottom:6}}>⚔</div>

// ─── BOSS TIMER ───────────────────────────────────────────────────────────────
function BossTimer({boss,startTime,tasksDone,large=false}){
  const [ms,setMs]=useState(Math.max(0,boss.timeLimitMs-(Date.now()-startTime)));
  useEffect(()=>{const iv=setInterval(()=>setMs(m=>Math.max(0,boss.timeLimitMs-(Date.now()-startTime))),1000);return()=>clearInterval(iv);},[startTime,boss.timeLimitMs]);
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  const str=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const urgent=ms<600000;
  return large?(
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",marginBottom:10}}>
      <span style={{fontSize:9,color:"#3a3a5a",letterSpacing:2}}>TIME REMAINING</span>
      <span className={urgent?"timer-urgent":""} style={{fontSize:16,fontWeight:"bold",color:urgent?"#ef4444":"#f59e0b",fontVariantNumeric:"tabular-nums"}}>{str}</span>
    </div>
  ):(
    <div className={urgent?"timer-urgent":""} style={{fontSize:10,color:urgent?"#ef4444":"#f59e0b",fontVariantNumeric:"tabular-nums"}}>{str}</div>
  );
}

// ─── CARD PICK ────────────────────────────────────────────────────────────────

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>{card.icon}</span>
          <div><div style={{fontSize:12,fontWeight:"bold",color:selected?card.accent:"#e0d8cc"}}>{card.title}</div><div style={{fontSize:8,color:tier.color,letterSpacing:2,marginTop:1}}>{tier.label} · ×{tier.xpMult} XP</div></div>
        </div>
      </div>

      <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{card.stats.map(s=><span key={s} style={{fontSize:8,padding:"2px 6px",borderRadius:2,background:"rgba(0,0,0,0.3)",border:"1px solid #1e1e35",color:STATS[s].color,letterSpacing:1}}>{STATS[s].icon} {STATS[s].label.toUpperCase()}</span>)}</div>

function Dashboard({activeTasks,completedTasks,allTasks,onComplete,onFail,rc,C,onSpawnBoss,activeBoss,nextBossSpawnTime}){
  const groups={};
  activeTasks.forEach(t=>{if(!groups[t.questId])groups[t.questId]={title:t.questTitle,accent:t.accent,tasks:[]};groups[t.questId].tasks.push(t);});
  const bossActive=activeBoss&&!activeBoss.failed&&!activeBoss.won;
  const [bossCountdown,setBossCountdown]=React.useState("");
  React.useEffect(()=>{
    const iv=setInterval(()=>{
      const ms=Math.max(0,(nextBossSpawnTime||0)-Date.now());
      const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
      setBossCountdown(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`);
    },1000);
    return()=>clearInterval(iv);
  },[nextBossSpawnTime]);
  return(
    <div>
      <div style={C.sysMsg}>▶ Complete your daily trials before midnight. The system watches.</div>
      {/* Boss Spawn Panel */}
      {!bossActive&&(
        <div style={{background:"rgba(239,68,68,0.05)",border:"1px solid #3a1a1a",borderRadius:5,padding:"12px 14px",marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontSize:9,color:"#ef4444",letterSpacing:2,marginBottom:4}}>⚔ BOSS ENCOUNTER</div>
              <div style={{fontSize:10,color:"#5a5a7a",lineHeight:1.5}}>A boss will appear at a random time. Be ready.</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:8,color:"#3a3a5a",letterSpacing:1,marginBottom:2}}>NEXT BOSS IN</div>
              <div style={{fontSize:14,color:"#f59e0b",fontVariantNumeric:"tabular-nums",fontWeight:"bold"}}>{bossCountdown}</div>
            </div>
          </div>
        </div>
      )}
      {allTasks.length===0&&<div style={{textAlign:"center",padding:"30px 0",color:"#3a3a5a"}}><div style={{fontSize:28,marginBottom:8}}>⚔</div><div style={{fontSize:12}}>No daily quests active.</div><div style={{fontSize:10,marginTop:3}}>Tap + to choose a trial archetype.</div></div>}
      {Object.values(groups).some(g=>g.tasks.some(t=>t.isPenalty))&&(<><div style={C.sh("#ef4444")}>⚠ PENALTY TASKS</div>{Object.entries(groups).filter(([,g])=>g.tasks.some(t=>t.isPenalty)).map(([id,g])=><QGroup key={id} group={g} onComplete={onComplete} onFail={onFail}/>)}</>)}
      {Object.values(groups).some(g=>g.tasks.some(t=>!t.isPenalty))&&(<><div style={C.sh(rc)}>TODAY'S TASKS</div>{Object.entries(groups).filter(([,g])=>g.tasks.some(t=>!t.isPenalty)).map(([id,g])=><QGroup key={id} group={g} onComplete={onComplete} onFail={onFail}/>)}</>)}
      {completedTasks.length>0&&(<><div style={C.sh("#3a3a5a")}>COMPLETED TODAY</div>{completedTasks.map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"7px 10px",marginBottom:5,borderLeft:`2px solid ${STATS[t.stat]?.color||"#4ade80"}`,opacity:0.5}}><span style={{fontSize:11,textDecoration:"line-through",color:"#3a5a3a"}}>{STATS[t.stat]?.icon} {t.title} · {t.value} {t.unit}</span><span style={{color:"#4ade80",fontSize:10}}>+{t.xpReward} XP</span></div>)}</>)}
    </div>
  );
}

function QGroup({group,onComplete,onFail}){
  const [open,setOpen]=useState(true);
  return(
    <div style={{background:`rgba(${hexToRgb(group.accent)},0.04)`,border:"1px solid #252540",borderRadius:5,marginBottom:12,overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 11px",cursor:"pointer",borderBottom:open?"1px solid #1e1e30":"none"}} onClick={()=>{playSfx("click");setOpen(o=>!o);}}>
        <div style={{fontSize:10,color:group.accent,fontWeight:"bold",letterSpacing:1}}>{group.title}</div>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:9,color:"#3a3a5a"}}>{group.tasks.filter(t=>t.completed).length}/{group.tasks.length}</span><span style={{color:group.accent,fontSize:10}}>{open?"▲":"▼"}</span></div>
      </div>
      {open&&group.tasks.map(t=><TaskRow key={t.id} task={t} onComplete={onComplete} onFail={onFail}/>)}
    </div>
  );
}

function TaskRow({task,onComplete,onFail}){
  const [open,setOpen]=useState(false);
  const sc=STATS[task.stat]?.color||"#a78bfa";
  const mode=STATS[task.stat]?.mode||"incremental";
  return(
    <div style={{borderBottom:"1px solid #1a1a28"}}>
      <div style={{display:"flex",alignItems:"center",padding:"9px 11px",cursor:"pointer",gap:8}} onClick={()=>{playSfx("click");setOpen(o=>!o);}}>
        <span style={{fontSize:14}}>{STATS[task.stat]?.icon}</span>
        <div style={{flex:1}}>
          {task.isPenalty&&<div style={{fontSize:8,color:"#ef4444",letterSpacing:2,marginBottom:1}}>⚠ PENALTY</div>}
          <div style={{fontSize:11,color:"#e0d8cc"}}>{task.title}</div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:2}}>
            <span style={{fontSize:11,color:sc,fontWeight:"bold"}}>{task.value} {task.unit}</span>
            <span style={{fontSize:8,padding:"1px 5px",borderRadius:2,border:"1px solid #1e1e35",color:"#3a3a5a"}}>{mode==="flat"?"HABIT":"DAY "+(task.dayIndex+1)}</span>
          </div>
        </div>
        <div style={{textAlign:"right"}}><div style={{fontSize:8,color:"#3a3a5a"}}>{STATS[task.stat]?.label}</div><div style={{fontSize:9,color:"#4a4a7a",marginTop:1}}>~{calcTaskXP(task)} XP</div></div>
        <div style={{color:sc,fontSize:10,marginLeft:3}}>{open?"▲":"▼"}</div>
      </div>
      {open&&<div style={{padding:"0 11px 11px",paddingTop:8,borderTop:"1px solid #1a1a28"}}>
        {task.detail&&<div style={{fontSize:10,color:"#5a5a7a",marginBottom:8}}>{task.detail}</div>}
        <div style={{display:"flex",gap:7}}>
          <button style={{flex:1,background:"#0f2a0f",border:"1px solid #4ade80",color:"#4ade80",padding:9,borderRadius:3,fontSize:11,cursor:"pointer",letterSpacing:1,fontFamily:"'Courier New',monospace"}} onClick={e=>{e.stopPropagation();onComplete(task.id);}}>✓ DONE</button>
          <button style={{flex:1,background:"#2a0f0f",border:"1px solid #ef4444",color:"#ef4444",padding:9,borderRadius:3,fontSize:11,cursor:"pointer",letterSpacing:1,fontFamily:"'Courier New',monospace"}} onClick={e=>{e.stopPropagation();onFail(task.id);}}>✗ FAILED</button>
        </div>
      </div>}
    </div>
  );
}

// ─── STATS VIEW ───────────────────────────────────────────────────────────────
function StatsView({statXP,hunter,achievements,rc,C}){
  const ovRank=getRank(hunter.xp);
  return(
    <div>
      <div style={C.sysMsg}>▶ Status window. True power revealed.</div>
      <div style={{background:"rgba(167,139,250,0.07)",border:"1px solid #2a2a4a",borderRadius:6,padding:"14px",marginBottom:18,textAlign:"center"}}>
        <div style={{fontSize:9,color:"#4a4a6a",letterSpacing:3,marginBottom:4}}>OVERALL RANK</div>
        <div style={{fontSize:44,fontWeight:"bold",color:RANK_COLORS[ovRank],letterSpacing:4,textShadow:`0 0 20px ${RANK_COLORS[ovRank]}`}}>{ovRank}</div>
        <div style={{fontSize:11,color:"#5a5a7a",marginTop:4}}>{hunter.xp.toLocaleString()} XP · {hunter.streak} day streak</div>
        <div style={{fontSize:8,color:"#3a3a5a",marginTop:3,letterSpacing:1}}>Next rank at {RANK_THRESHOLDS[RANKS.indexOf(ovRank)+1]?.toLocaleString()||"MAX"} XP</div>
      </div>
      {/* Active buffs */}
      {achievements.length>0&&(()=>{
        const buffs={};
        achievements.forEach(id=>{
          let a=ACHIEVEMENT_CATALOG.find(a=>a.id===id);
          if(!a)BOSSES.forEach(b=>{if(b.achievementDrop?.id===id)a=b.achievementDrop;});
          if(a?.buff){if(!buffs[a.buff.stat])buffs[a.buff.stat]=0;buffs[a.buff.stat]+=a.buff.pct;}
        });
        const entries=Object.entries(buffs);
        if(!entries.length)return null;
        return(<div style={{background:"rgba(74,222,128,0.05)",border:"1px solid #1a3a1a",borderRadius:4,padding:"10px 12px",marginBottom:14}}>
          <div style={{fontSize:9,color:"#4ade80",letterSpacing:2,marginBottom:6}}>⚡ ACTIVE BUFFS</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{entries.map(([st,pct])=><span key={st} style={{fontSize:9,padding:"2px 8px",borderRadius:2,border:"1px solid #1a3a1a",color:STATS[st]?.color||"#4ade80",background:"rgba(0,0,0,0.3)"}}>{STATS[st]?.icon} {STATS[st]?.label} +{pct}% XP</span>)}</div>
        </div>);
      })()}
      <div style={C.sh(rc)}>STAT RANKS</div>
      {Object.entries(STATS).map(([key,cat])=>{
        const xp=statXP[key]||0,sr=getStatRank(xp),pct=getStatPct(xp),sc=RANK_COLORS[sr];
        const nextXP=STAT_RANK_XP[getStatRankIdx(xp)+1];
        const buff=getBuffMult(achievements,key);
        return(
          <div key={key} style={{background:"rgba(0,0,0,0.3)",border:"1px solid #1e1e30",borderRadius:4,padding:"10px 12px",marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:17}}>{cat.icon}</span>
                <div><div style={{fontSize:11,color:cat.color,letterSpacing:1}}>{cat.label}{buff>1&&<span style={{fontSize:8,color:"#4ade80",marginLeft:5}}>+{Math.round((buff-1)*100)}% XP</span>}</div><div style={{fontSize:9,color:"#3a3a5a"}}>{cat.desc}</div></div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#3a3a5a"}}>{xp.toLocaleString()} XP</div>{nextXP&&<div style={{fontSize:8,color:"#2a2a4a"}}>/{nextXP.toLocaleString()}</div>}</div>
                <div style={{background:`rgba(${hexToRgb(sc)},0.15)`,border:`1px solid ${sc}`,borderRadius:3,padding:"2px 7px",fontSize:10,fontWeight:"bold",color:sc,minWidth:28,textAlign:"center"}}>{sr}</div>
              </div>
            </div>
            <div style={{height:2,background:"#1a1a2e",borderRadius:1}}><div style={{height:"100%",width:pct+"%",background:cat.color,borderRadius:1,transition:"width 0.5s",boxShadow:`0 0 4px ${cat.color}`}}/></div>
            <div style={{fontSize:8,color:"#3a3a5a",marginTop:2,textAlign:"right"}}>{pct}% → {getStatNextRank(xp)}</div>
          </div>
        );
      })}
    </div>
  );
}

// ─── QUESTS VIEW ──────────────────────────────────────────────────────────────
function QuestsView({quests,dailyTasks,rc,C}){
  return(
    <div>
      <div style={C.sysMsg}>▶ Active trials. Long-term progress.</div>
      {quests.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:"#3a3a5a",fontSize:12}}>No quests yet. Tap + to begin.</div>}
      {quests.map(q=>{
        const tier=TIERS[q.tier||"common"];
        return(
          <div key={q.id} style={{background:q.completed?"rgba(74,222,128,0.04)":tier.bg,border:`1px solid ${q.completed?"#1a3a1a":tier.border}`,borderRadius:5,padding:"12px 13px",marginBottom:11,boxShadow:tier.glow}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div><div style={{fontSize:8,color:tier.color,letterSpacing:2,marginBottom:2}}>{tier.label}</div><div style={{fontSize:13,color:q.completed?"#4ade80":"#e0d8cc",fontWeight:"bold"}}>{q.cardIcon} {q.cardTitle}</div></div>
              <div style={{color:q.completed?"#4ade80":(q.accent||rc),fontSize:9,padding:"3px 8px",borderRadius:3,border:`1px solid ${q.completed?"#4ade80":(q.accent||rc)}`}}>{q.completed?"COMPLETE":"ACTIVE"}</div>
            </div>
            {(q.subGoals||[]).map(sg=>{
              const mode=STATS[sg.stat]?.mode||"incremental";
              const totalDays=sg.durationWeeks*7,day=sg.dayIndex||0,pct=Math.min(100,Math.round((day/totalDays)*100));
              const todayTask=dailyTasks.find(t=>t.questId===q.id&&t.stat===sg.stat&&!t.completed&&!t.failed);
              return(
                <div key={sg.stat} style={{padding:"7px 0",borderTop:"1px solid #1a1a2a"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{fontSize:12}}>{STATS[sg.stat]?.icon}</span>
                      <div><div style={{fontSize:10,color:"#b0a8c0"}}>{sg.title}</div><div style={{fontSize:8,color:"#3a3a5a"}}>{mode==="flat"?`${sg.target} ${sg.unit} daily`:`${sg.startValue||0} → ${sg.target} ${sg.unit}`} · {sg.durationWeeks}w</div></div>
                    </div>
                    <div style={{textAlign:"right"}}>{todayTask&&<div style={{fontSize:9,color:STATS[sg.stat]?.color}}>Today: {todayTask.value} {sg.unit}</div>}<div style={{fontSize:8,color:"#3a3a5a"}}>Day {day}/{totalDays}</div></div>
                  </div>
                  <div style={{height:2,background:"#1a1a2e",borderRadius:1}}><div style={{height:"100%",width:pct+"%",background:STATS[sg.stat]?.color||"#a78bfa",borderRadius:1}}/></div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ─── ACHIEVEMENTS VIEW ────────────────────────────────────────────────────────
function AchieveView({achievements,titles,equippedTitle,onEquipTitle,log,C,rc}){
  const [tab,setTab]=useState("achievements");
  const unlocked=new Set(achievements);
  const allAch=[...ACHIEVEMENT_CATALOG,...BOSSES.map(b=>b.achievementDrop).filter(Boolean)];
  return(
    <div>
      <div style={{display:"flex",gap:0,marginBottom:14,border:"1px solid #2a2a4a",borderRadius:4,overflow:"hidden"}}>
        {["achievements","titles","log"].map(t=><button key={t} onClick={()=>{playSfx("click");setTab(t);}} style={{flex:1,padding:"8px",background:tab===t?"rgba(167,139,250,0.15)":"none",border:"none",borderRight:t!=="log"?"1px solid #2a2a4a":"none",color:tab===t?"#a78bfa":"#3a3a5a",fontSize:9,letterSpacing:2,cursor:"pointer",textTransform:"uppercase",fontFamily:"'Courier New',monospace"}}>{t}</button>)}
      </div>

      {tab==="achievements"&&(
        <div>
          <div style={C.sysMsg}>▶ Hidden achievements. Unlock them to gain permanent buffs.</div>
          <div style={{fontSize:10,color:"#4a4a6a",marginBottom:10}}>{achievements.length}/{allAch.length} unlocked</div>
          {allAch.map(a=>{
            const done=unlocked.has(a.id);
            return(
              <div key={a.id} className={done?"achieve-pop":""} style={{display:"flex",gap:10,padding:"10px 12px",marginBottom:8,background:done?"rgba(167,139,250,0.08)":"rgba(0,0,0,0.2)",border:`1px solid ${done?"#3a2a5a":"#1e1e2a"}`,borderRadius:4,opacity:done?1:0.45,transition:"all 0.2s"}}>
                <div style={{fontSize:22,width:30,textAlign:"center",flexShrink:0}}>{done?a.icon||"🏆":"🔒"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:11,color:done?"#e0d8cc":"#3a3a5a",fontWeight:done?"bold":"normal"}}>{done?a.name:"???"}</div>
                  <div style={{fontSize:9,color:done?"#5a5a7a":"#2a2a3a",marginTop:2}}>{done?a.desc:"Complete hidden objectives to unlock"}</div>
                  {done&&a.buff&&<div style={{fontSize:9,color:STATS[a.buff.stat]?.color||"#a78bfa",marginTop:4}}>⚡ +{a.buff.pct}% {STATS[a.buff.stat]?.label} XP permanently</div>}
                </div>
                {done&&<div style={{fontSize:9,color:"#4ade80",alignSelf:"center"}}>✓</div>}
              </div>
            );
          })}
        </div>
      )}

      {tab==="titles"&&(
        <div>
          <div style={C.sysMsg}>▶ Defeat bosses to earn titles. Equip one to display it.</div>
          <div style={{fontSize:10,color:"#4a4a6a",marginBottom:10}}>{titles.length}/{ALL_TITLES.length} unlocked</div>
          {ALL_TITLES.map((t,idx)=>{
            const owned=titles.includes(t);
            const equipped=equippedTitle===t;
            return(
              <div key={t} className={owned?"achieve-pop":""} style={{display:"flex",gap:10,padding:"10px 12px",marginBottom:8,background:equipped?"rgba(245,158,11,0.1)":owned?"rgba(167,139,250,0.06)":"rgba(0,0,0,0.2)",border:`1px solid ${equipped?"#f59e0b":owned?"#3a2a5a":"#1e1e2a"}`,borderRadius:4,opacity:owned?1:0.4,transition:"all 0.2s",alignItems:"center"}}>
                <div style={{fontSize:22,width:30,textAlign:"center",flexShrink:0}}>{owned?"👑":"🔒"}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:equipped?"#f59e0b":owned?"#e0d8cc":"#3a3a5a",fontWeight:equipped||owned?"bold":"normal"}}>{owned?t:"???"}</div>
                  <div style={{fontSize:9,color:owned?"#5a5a7a":"#2a2a3a",marginTop:2}}>{owned?(equipped?"Currently equipped":"Defeat bosses to drop titles at 5% chance"):"Complete boss battles to unlock titles"}</div>
                  {equipped&&<div style={{fontSize:9,color:"#f59e0b",marginTop:2}}>✦ EQUIPPED</div>}
                </div>
                {owned&&<button onClick={()=>onEquipTitle(t)} style={{padding:"5px 12px",border:`1px solid ${equipped?"#f59e0b":"#3a3a5a"}`,borderRadius:3,background:equipped?"rgba(245,158,11,0.2)":"none",color:equipped?"#f59e0b":"#5a5a7a",fontSize:9,cursor:"pointer",fontFamily:"'Courier New',monospace",letterSpacing:1,flexShrink:0}}>{equipped?"UNEQUIP":"EQUIP"}</button>}
              </div>
            );
          })}
        </div>
      )}

      {tab==="log"&&(
        <div>
          <div style={C.sysMsg}>▶ Activity log. Every action recorded.</div>
          {log.length===0&&<div style={{color:"#3a3a5a",fontSize:12,textAlign:"center",padding:36}}>No activity yet.</div>}
          {log.map(e=><div key={e.id} style={{borderLeft:`2px solid ${(e.text.includes("FAILED")||e.text.includes("failed")||e.text.includes("missed"))?"#ef4444":e.text.includes("⚔")?"#f59e0b":"#a78bfa"}`,paddingLeft:11,marginBottom:11}}>
            <div style={{fontSize:11,color:"#e0d8cc"}}>{e.text}</div>
            <div style={{fontSize:9,color:"#3a3a5a",marginTop:2}}>{e.time}</div>
          </div>)}
        </div>
      )}
    </div>
  );
}

// ─── NOTIFS VIEW ──────────────────────────────────────────────────────────────
function NotifsView({notifications,C,notifInt,setNotifInt,notifPerm,setNotifPerm}){
  const opts=[15,30,60,120,240];
  return(
    <div>
      <div style={C.sysMsg}>▶ System messages. The dungeon speaks.</div>
      <div style={{background:"rgba(167,139,250,0.07)",border:"1px solid #2a2a4a",borderRadius:4,padding:"11px 13px",marginBottom:14}}>
        <div style={{fontSize:9,color:"#a78bfa",letterSpacing:2,marginBottom:8}}>⏱ REMINDER INTERVAL</div>
        {notifPerm!=="granted"&&<div style={{marginBottom:10}}><div style={{fontSize:10,color:"#f59e0b",marginBottom:7}}>{notifPerm==="denied"?"⚠ Blocked. Enable in phone settings.":"⚠ Allow notifications for daily reminders."}</div>{notifPerm!=="denied"&&<button onClick={async()=>{const p=await Notification.requestPermission();setNotifPerm(p);}} style={{padding:"6px 14px",background:"rgba(167,139,250,0.2)",border:"1px solid #a78bfa",color:"#a78bfa",borderRadius:3,fontSize:10,cursor:"pointer",fontFamily:"'Courier New',monospace"}}>ALLOW</button>}</div>}
        {notifPerm==="granted"&&<div style={{fontSize:9,color:"#4ade80",marginBottom:8}}>✓ Notifications active</div>}
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{opts.map(m=><button key={m} onClick={()=>setNotifInt(m)} style={{padding:"5px 10px",borderRadius:3,border:"1px solid "+(notifInt===m?"#a78bfa":"#2a2a4a"),background:notifInt===m?"rgba(167,139,250,0.2)":"none",color:notifInt===m?"#a78bfa":"#3a3a5a",fontSize:9,cursor:"pointer",fontFamily:"'Courier New',monospace"}}>{m<60?m+"m":(m/60)+"h"}</button>)}</div>
      </div>
      {notifications.length===0&&<div style={{color:"#3a3a5a",fontSize:12,textAlign:"center",padding:36}}>No notifications yet.</div>}
      {notifications.map(n=><div key={n.id} style={{background:n.type==="penalty"?"rgba(239,68,68,0.07)":n.type==="boss"?"rgba(245,158,11,0.07)":n.type==="reward"?"rgba(74,222,128,0.07)":"rgba(167,139,250,0.07)",border:"1px solid "+(n.type==="penalty"?"#3a1a1a":n.type==="boss"?"#4a3a00":n.type==="reward"?"#1a3a1a":"#2a1a3a"),borderRadius:4,padding:"9px 11px",marginBottom:7}}>
        <div style={{fontSize:11,color:"#e0d8cc"}}>{n.msg}</div>
        <div style={{fontSize:9,color:"#3a3a5a",marginTop:2}}>{n.time}</div>
      </div>)}
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
